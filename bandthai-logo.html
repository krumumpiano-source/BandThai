<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="UTF-8">
<title>BandThai Logo</title>
<link href="https://fonts.googleapis.com/css2?family=Kanit:wght@400;700;900&display=swap" rel="stylesheet">
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    display: flex;
    justify-content: center;
    align-items: center;
    min-height: 100vh;
    background: #e5e7eb;
    font-family: 'Kanit', sans-serif;
  }
  .logo-wrap {
    width: 640px;
    height: 640px;
    border-radius: 50%;
    background: #111827;
    display: flex;
    flex-direction: column;
    justify-content: center;
    align-items: center;
    position: relative;
    overflow: hidden;
    box-shadow: 0 20px 60px rgba(0,0,0,0.4);
  }
  /* outer gold ring */
  .logo-wrap::after {
    content: '';
    position: absolute;
    inset: 6px;
    border-radius: 50%;
    border: 2.5px solid rgba(246, 173, 85, 0.35);
    pointer-events: none;
  }
  /* inner subtle ring */
  .inner-ring {
    position: absolute;
    inset: 22px;
    border-radius: 50%;
    border: 1px solid rgba(246, 173, 85, 0.12);
    pointer-events: none;
  }
  /* warm glow */
  .glow {
    position: absolute;
    top: -30%;
    left: -30%;
    width: 160%;
    height: 160%;
    background: radial-gradient(circle at 40% 35%, rgba(246,173,85,0.10) 0%, transparent 55%);
    pointer-events: none;
  }
  .music-note {
    font-size: 64px;
    color: #f6ad55;
    margin-bottom: 2px;
    filter: drop-shadow(0 2px 8px rgba(246,173,85,0.4));
  }
  .brand-name {
    font-size: 80px;
    font-weight: 900;
    letter-spacing: 4px;
    background: linear-gradient(180deg, #fef5e7 0%, #f6ad55 45%, #d4a843 75%, #a06a00 100%);
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    background-clip: text;
    filter: drop-shadow(0 3px 6px rgba(0,0,0,0.5));
    line-height: 1;
  }
  .tagline {
    font-size: 16px;
    letter-spacing: 10px;
    color: rgba(246, 173, 85, 0.55);
    margin-top: 8px;
    font-weight: 400;
  }
  /* floating notes */
  .note-float {
    position: absolute;
    color: rgba(246,173,85,0.15);
    pointer-events: none;
  }
  .n1 { top: 90px; left: 110px; font-size: 44px; transform: rotate(-15deg); }
  .n2 { top: 130px; right: 100px; font-size: 34px; transform: rotate(12deg); }
  .n3 { bottom: 120px; left: 130px; font-size: 38px; transform: rotate(8deg); }
  .n4 { bottom: 100px; right: 120px; font-size: 30px; transform: rotate(-12deg); }

  .hint {
    margin-top: 20px;
    color: #888;
    font-size: 14px;
    text-align: center;
    font-family: sans-serif;
  }
  .save-btn {
    display: block;
    margin: 16px auto 0;
    padding: 12px 32px;
    font-size: 16px;
    font-weight: 700;
    font-family: 'Kanit', sans-serif;
    color: #fff;
    background: linear-gradient(135deg, #f6ad55, #d4a843);
    border: none;
    border-radius: 12px;
    cursor: pointer;
    box-shadow: 0 4px 14px rgba(246,173,85,0.4);
    transition: transform .15s, box-shadow .15s;
  }
  .save-btn:hover { transform: translateY(-1px); box-shadow: 0 6px 20px rgba(246,173,85,0.5); }
  .save-btn:active { transform: scale(.97); }
</style>
<script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
</head>
<body>
  <div>
    <div class="logo-wrap" id="logoEl">
      <div class="glow"></div>
      <div class="inner-ring"></div>
      <div class="note-float n1">&#9835;</div>
      <div class="note-float n2">&#9836;</div>
      <div class="note-float n3">&#9833;</div>
      <div class="note-float n4">&#9834;</div>
      <div class="music-note">&#9835;</div>
      <div class="brand-name">BandThai</div>
      <div class="tagline">By SoulCiety</div>
    </div>
    <p class="hint">640×640 px — รูปโปรไฟล์ LINE</p>
    <button class="save-btn" onclick="saveLogo()">💾 บันทึกเป็น PNG (640×640)</button>
  </div>
  <script>
    function saveLogo() {
      var el = document.getElementById('logoEl');
      html2canvas(el, {
        width: 640,
        height: 640,
        scale: 1,
        backgroundColor: null,
        useCORS: true,
        logging: false
      }).then(function(canvas) {
        var link = document.createElement('a');
        link.download = 'BandThai-LINE-Profile-640x640.png';
        link.href = canvas.toDataURL('image/png');
        link.click();
      });
    }
  </script>
</body>
</html>
