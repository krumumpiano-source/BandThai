<!DOCTYPE html>
<html lang="th">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
  <title>ส่วนแบ่งรายได้ — BandThai</title>
  <link href="https://fonts.googleapis.com/css2?family=Kanit:wght@400;600;700&family=Sarabun:wght@400;500;600&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="css/theme.css">
  <link rel="stylesheet" href="css/nav.css">
  <link rel="stylesheet" href="css/compat.css">
  <style>
    .wl-wrap { max-width: 900px; margin: 0 auto; padding: 0 16px 60px; }

    /* ── Stats bar ── */
    .stats-bar {
      display: flex; gap: 10px; flex-wrap: wrap; margin-bottom: 20px;
    }
    .stat-chip {
      background: var(--premium-white); border: 1.5px solid var(--premium-border);
      border-radius: 10px; padding: 12px 18px; flex: 1; min-width: 130px;
      text-align: center;
    }
    .stat-chip .sc-num { font-size: 1.5rem; font-weight: 700; color: var(--premium-gold-dark); line-height: 1.1; }
    .stat-chip .sc-lbl { font-size: .72rem; color: var(--premium-text-muted); margin-top: 3px; }

    /* ── Revenue Calculator ── */
    .revenue-box {
      background: linear-gradient(135deg, #1a1a2e, #16213e);
      border-radius: 14px; padding: 20px 24px; margin-bottom: 24px;
      display: flex; align-items: center; gap: 16px; flex-wrap: wrap;
    }
    .revenue-box label { color: rgba(255,255,255,.8); font-size: .9rem; font-weight: 600; white-space: nowrap; }
    .revenue-input {
      flex: 1; min-width: 160px; max-width: 240px;
      padding: 10px 14px; border-radius: 10px; border: 2px solid rgba(255,255,255,.2);
      background: rgba(255,255,255,.1); color: #fff; font-size: 1rem;
      font-family: inherit; font-weight: 700; outline: none;
    }
    .revenue-input:focus { border-color: var(--premium-gold); }
    .revenue-input::placeholder { color: rgba(255,255,255,.35); font-weight: 400; }
    .revenue-hint { color: rgba(255,255,255,.5); font-size: .78rem; }
    .revenue-total { color: var(--premium-gold); font-size: .9rem; font-weight: 700; }

    /* ── Member Table ── */
    .member-table-wrap {
      background: var(--premium-white); border: 1.5px solid var(--premium-border);
      border-radius: 14px; overflow: hidden; margin-bottom: 24px;
    }
    .member-table-head {
      padding: 14px 20px; background: var(--premium-off-white);
      border-bottom: 1.5px solid var(--premium-border);
      display: flex; justify-content: space-between; align-items: center;
    }
    .member-table-head h2 { font-size: .88rem; font-weight: 700; color: var(--premium-text); margin: 0; }
    .member-table-head span { font-size: .75rem; color: var(--premium-text-muted); }
    table.mt { width: 100%; border-collapse: collapse; }
    table.mt th {
      text-align: right; padding: 10px 14px; font-size: .7rem; font-weight: 700;
      color: var(--premium-text-muted); text-transform: uppercase; letter-spacing: .04em;
      background: var(--premium-off-white); border-bottom: 1px solid var(--premium-border);
    }
    table.mt th:first-child { text-align: left; }
    table.mt td { padding: 12px 14px; border-bottom: 1px solid var(--premium-light-gray); text-align: right; vertical-align: middle; }
    table.mt td:first-child { text-align: left; }
    table.mt tr:last-child td { border-bottom: none; }
    table.mt tr:hover td { background: var(--premium-off-white); }
    .mt-name { font-weight: 700; font-size: .92rem; color: var(--premium-text); }
    .mt-sub { font-size: .72rem; color: var(--premium-text-muted); margin-top: 2px; }
    .pct-badge {
      display: inline-block; padding: 3px 10px; border-radius: 99px;
      font-size: .8rem; font-weight: 700; background: var(--premium-gold); color: #fff;
    }
    .baht-cell { font-weight: 700; font-size: 1rem; color: #16a34a; }
    .bar-wrap { background: var(--premium-light-gray); border-radius: 99px; height: 5px; width: 80px; display: inline-block; vertical-align: middle; }
    .bar-fill { height: 5px; border-radius: 99px; background: var(--premium-gold); min-width: 2px; }

    /* ── Info note ── */
    .info-note {
      background: #FFFBEB; border: 1.5px solid #FDE68A; border-radius: 10px;
      padding: 12px 16px; margin-bottom: 20px; font-size: .8rem; color: #92400E;
      display: flex; gap: 8px; align-items: flex-start;
    }

    /* ── Collapsible log ── */
    .log-details {
      background: var(--premium-white); border: 1.5px solid var(--premium-border);
      border-radius: 14px; overflow: hidden;
    }
    .log-details summary {
      padding: 14px 20px; cursor: pointer; font-weight: 700; font-size: .88rem;
      color: var(--premium-text); list-style: none; display: flex; align-items: center;
      justify-content: space-between; user-select: none;
      background: var(--premium-off-white);
    }
    .log-details summary:hover { background: var(--premium-light-gray); }
    .log-details[open] summary { border-bottom: 1.5px solid var(--premium-border); }
    .log-wrap { padding: 16px 20px; }
    .log-filters { display: flex; gap: 8px; flex-wrap: wrap; margin-bottom: 12px; align-items: center; }
    .log-filters select, .log-filters input[type=date] {
      padding: 6px 10px; border: 1.5px solid var(--premium-border); border-radius: 8px;
      font-size: .8rem; font-family: inherit; background: var(--premium-off-white);
      color: var(--premium-text);
    }
    .log-filters select:focus, .log-filters input[type=date]:focus { outline: none; border-color: var(--premium-gold); }
    .log-tbl { width: 100%; border-collapse: collapse; font-size: .82rem; }
    .log-tbl th {
      background: var(--premium-off-white); text-align: left; padding: 7px 10px;
      font-size: .68rem; font-weight: 700; color: var(--premium-text-muted);
      text-transform: uppercase; letter-spacing: .04em;
      border-bottom: 1px solid var(--premium-border);
    }
    .log-tbl td { padding: 7px 10px; border-bottom: 1px solid var(--premium-light-gray); vertical-align: middle; }
    .log-tbl tr:last-child td { border-bottom: none; }
    .act-badge { display: inline-block; padding: 2px 7px; border-radius: 6px; font-size: .7rem; font-weight: 700; }
    .act-add    { background: #D1FAE5; color: #065F46; }
    .act-edit   { background: #DBEAFE; color: #1E3A8A; }
    .act-delete { background: #FEE2E2; color: #991B1B; }
    .act-merge  { background: #EDE9FE; color: #4C1D95; }
    .act-bulk   { background: #FEF9C3; color: #854D0E; }
    .act-artist { background: #F0FDF4; color: #166534; }
    .score-pill {
      display: inline-block; min-width: 22px; text-align: center;
      padding: 1px 5px; border-radius: 99px; font-size: .7rem; font-weight: 700;
      background: var(--premium-gold); color: #fff;
    }
    .btn-sm {
      display: inline-flex; align-items: center; gap: 5px;
      padding: 6px 12px; border-radius: 8px; border: 1.5px solid var(--premium-border);
      background: var(--premium-off-white); color: var(--premium-text);
      font-size: .78rem; font-weight: 700; cursor: pointer; font-family: inherit;
    }
    .btn-sm:hover { background: var(--premium-light-gray); }
    .btn-sm.primary { background: var(--premium-gold); color: #fff; border-color: var(--premium-gold); }
    .btn-sm.primary:hover { background: var(--premium-gold-dark); }
    .log-empty { text-align: center; padding: 32px; color: var(--premium-text-muted); }

    @media (max-width: 640px) {
      .stat-chip { min-width: calc(50% - 5px); }
      .revenue-box { flex-direction: column; align-items: flex-start; }
      table.mt th:nth-child(2), table.mt td:nth-child(2) { display: none; }
      .bar-wrap { display: none; }
    }
  </style>
</head>
<body>
  <div id="mainNav"></div>
  <div id="toast"></div>
  <main>
    <div class="container wl-wrap">

      <!-- Header -->
      <div class="page-header" style="margin-bottom:16px">
        <h1 class="page-title">💰 ส่วนแบ่งรายได้</h1>
        <p style="font-size:.82rem;color:var(--premium-text-muted);margin:4px 0 0">คิดจากสัดส่วนงานที่แต่ละคนดูแลในระบบทั้งหมด (คะแนนงานสะสม)</p>
      </div>

      <!-- Stats bar -->
      <div class="stats-bar" id="statsBar">
        <div class="stat-chip"><div class="sc-num" id="statTotal">—</div><div class="sc-lbl">🎵 เพลงทั้งหมด</div></div>
        <div class="stat-chip"><div class="sc-num" id="statHistorical">—</div><div class="sc-lbl">📅 คะแนนฐาน (ก่อนติดตาม)</div></div>
        <div class="stat-chip"><div class="sc-num" id="statTracked">—</div><div class="sc-lbl">✅ คะแนนงานสะสม</div></div>
        <div class="stat-chip"><div class="sc-num" id="statSince">—</div><div class="sc-lbl">⚡ ติดตามตั้งแต่</div></div>
      </div>

      <!-- Revenue Calculator -->
      <div class="revenue-box">
        <label>💵 รายได้เดือนนี้</label>
        <input type="number" id="monthlyIncome" class="revenue-input" placeholder="ระบุจำนวนเงิน (บาท)" min="0" oninput="calcRevenue()">
        <div>
          <div class="revenue-hint">กรอกยอดรวมรายได้ที่จะแบ่ง</div>
          <div class="revenue-total" id="revenueTotal"></div>
        </div>
      </div>

      <!-- Info note -->
      <div class="info-note" id="infoNote" style="display:none">
        ℹ️ <div id="infoNoteText"></div>
      </div>

      <!-- Member Table -->
      <div class="member-table-wrap" id="memberTableWrap">
        <div class="member-table-head">
          <h2>👥 สัดส่วนการทำงาน</h2>
          <span id="memberCount"></span>
        </div>
        <div id="memberTableBody" style="padding:32px;text-align:center;color:var(--premium-text-muted)">⏳ กำลังโหลด...</div>
      </div>

      <!-- Collapsible activity log -->
      <details class="log-details" id="logDetails" ontoggle="if(this.open) loadLogIfNeeded()">
        <summary>
          <span>📋 ประวัติการทำงานละเอียด</span>
          <span style="font-size:.75rem;font-weight:400;color:var(--premium-text-muted)">คลิกเพื่อดู ▼</span>
        </summary>
        <div class="log-wrap">
          <div class="log-filters">
            <select id="logFilterUser"><option value="">ทุกคน</option></select>
            <select id="logFilterAction">
              <option value="">ทุกประเภท</option>
              <option value="add_song">เพิ่มเพลง</option>
              <option value="edit_song">แก้ไขเพลง</option>
              <option value="delete_song">ลบเพลง</option>
              <option value="merge_songs">รวมเพลงซ้ำ</option>
              <option value="bulk_add">เพิ่มเพลงกลุ่ม</option>
              <option value="add_artist">เพิ่มศิลปิน</option>
              <option value="edit_artist">แก้ไขศิลปิน</option>
              <option value="delete_artist">ลบศิลปิน</option>
            </select>
            <input type="date" id="logFrom">
            <input type="date" id="logTo">
            <button class="btn-sm primary" onclick="applyLogFilter()">🔍 กรอง</button>
            <button class="btn-sm" onclick="exportCsv()">📥 CSV</button>
          </div>
          <div id="logTableArea"><div class="log-empty">คลิก กรอง เพื่อโหลดข้อมูล</div></div>
        </div>
      </details>

    </div>
  </main>

  <script src="js/i18n.js?v=3"></script>
  <script src="js/app.js?v=3"></script>
  <script src="js/nav.js?v=3"></script>
  <script>
  var _stats   = null;
  var _logData = [];
  var _logLoaded = false;

  function esc(s) { return String(s||'').replace(/[&<>"']/g,function(c){return{'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c];}); }
  function fmtNum(n) { return Number(n||0).toLocaleString('th-TH'); }
  function fmtBaht(n) { return Number(n||0).toLocaleString('th-TH',{minimumFractionDigits:2,maximumFractionDigits:2}); }
  function fmtDate(dt) {
    if (!dt) return '—';
    return new Date(dt).toLocaleDateString('th-TH',{day:'numeric',month:'short',year:'2-digit'});
  }
  function fmtDt(dt) {
    if (!dt) return '—';
    var d = new Date(dt);
    return d.toLocaleDateString('th-TH',{day:'numeric',month:'short'}) + ' ' +
           d.toLocaleTimeString('th-TH',{hour:'2-digit',minute:'2-digit'});
  }

  var ACTION_LABELS = {
    add_song:'เพิ่มเพลง', edit_song:'แก้ไขเพลง', delete_song:'ลบเพลง',
    merge_songs:'รวมเพลงซ้ำ', bulk_add:'เพิ่มเพลงกลุ่ม',
    add_artist:'เพิ่มศิลปิน', edit_artist:'แก้ไขศิลปิน', delete_artist:'ลบศิลปิน'
  };
  var ACTION_CLASS = {
    add_song:'act-add', edit_song:'act-edit', delete_song:'act-delete',
    merge_songs:'act-merge', bulk_add:'act-bulk',
    add_artist:'act-artist', edit_artist:'act-edit', delete_artist:'act-delete'
  };
  var COLORS = ['#f6ad55','#68d391','#63b3ed','#fc8181','#b794f4','#f687b3','#4fd1c5'];

  // ── Revenue calculator ──────────────────────────────────────────
  function calcRevenue() {
    if (!_stats || !_stats.members || !_stats.members.length) return;
    var income = parseFloat(document.getElementById('monthlyIncome').value) || 0;
    document.getElementById('revenueTotal').textContent =
      income > 0 ? 'ยอดรวม ' + fmtBaht(income) + ' บาท' : '';

    var rows = document.querySelectorAll('.baht-cell');
    _stats.members.forEach(function(m, i) {
      if (rows[i]) {
        var share = income * m.pct / 100;
        rows[i].textContent = income > 0 ? fmtBaht(share) + ' ฿' : '—';
      }
    });
  }

  // ── Render member table ─────────────────────────────────────────
  function renderMemberTable(stats) {
    var members = stats.members || [];
    document.getElementById('memberCount').textContent = members.length + ' คน';

    if (!members.length) {
      document.getElementById('memberTableBody').innerHTML =
        '<div style="padding:32px;text-align:center;color:var(--premium-text-muted)">' +
        '⚠️ ยังไม่มีผู้ดูแลเพลง — ให้ Admin ตั้งค่าที่ <a href="admin-songs" style="color:var(--premium-gold)">คลังเพลง</a> → ปุ่ม 👥 จัดการผู้ดูแลเพลง' +
        '</div>';
      return;
    }

    var html = '<table class="mt">' +
      '<thead><tr>' +
      '<th>ชื่อสมาชิก</th>' +
      '<th>คะแนนฐาน</th>' +
      '<th>คะแนนงาน</th>' +
      '<th>สัดส่วน</th>' +
      '<th>แบ่งได้ (บาท)</th>' +
      '</tr></thead><tbody>';

    members.forEach(function(m, i) {
      var color = COLORS[i % COLORS.length];
      html += '<tr>' +
        '<td><div class="mt-name" style="color:' + color + '">● ' + esc(m.userName) + '</div>' +
          '<div class="mt-sub">รวม ' + fmtNum(m.totalScore) + ' คะแนน</div></td>' +
        '<td>' + fmtNum(m.baseScore) + '</td>' +
        '<td>' + fmtNum(m.activityScore) + '</td>' +
        '<td>' +
          '<span class="pct-badge" style="background:' + color + '">' + m.pct + '%</span>' +
          '&nbsp;<span class="bar-wrap"><span class="bar-fill" style="width:' + m.pct + '%;background:' + color + '"></span></span>' +
        '</td>' +
        '<td><div class="baht-cell">—</div></td>' +
      '</tr>';
    });

    html += '</tbody></table>';
    document.getElementById('memberTableBody').innerHTML = html;
  }

  // ── Load main stats ─────────────────────────────────────────────
  function loadStats() {
    apiCall('getMemberWorkStats', {}, function(r) {
      if (!r || !r.success) {
        document.getElementById('memberTableBody').innerHTML =
          '<div style="padding:24px;text-align:center;color:#DC2626">⚠️ โหลดข้อมูลไม่ได้: ' + (r && r.message || 'ไม่พบข้อมูล') + '</div>';
        return;
      }
      _stats = r;

      // Stats bar
      document.getElementById('statTotal').textContent      = fmtNum(r.totalSongs);
      document.getElementById('statHistorical').textContent = fmtNum(r.baseScore);
      document.getElementById('statTracked').textContent    = fmtNum(r.totalActivityScore);
      document.getElementById('statSince').textContent      = r.trackStart ? fmtDate(r.trackStart) : 'ยังไม่มี';

      // Info note
      if (r.baseScore > 0) {
        var nm = (r.members || []).length || 1;
        document.getElementById('infoNote').style.display = 'flex';
        document.getElementById('infoNoteText').innerHTML =
          'คะแนนฐานจากเพลง ' + fmtNum(r.totalSongs) + ' เพลงก่อนเริ่มติดตาม (<strong>' + fmtNum(r.baseScore) + ' คะแนน</strong>) แบ่งเท่าๆ กัน คนละ <strong>' + fmtNum(Math.round(r.baseScore / nm)) + ' คะแนน</strong>';
      }

      renderMemberTable(r);

      // Populate log user dropdown
      var sel = document.getElementById('logFilterUser');
      (r.members || []).forEach(function(m) {
        if (!sel.querySelector('option[value="' + m.userId + '"]')) {
          var opt = document.createElement('option');
          opt.value = m.userId; opt.textContent = m.userName;
          sel.appendChild(opt);
        }
      });
    });
  }

  // ── Activity log ───────────────────────────────────────────────
  var _logOpened = false;
  function loadLogIfNeeded() {
    if (_logOpened) return;
    _logOpened = true;
    // Set default date range: last 30 days
    var today = new Date();
    var from  = new Date(today); from.setDate(from.getDate() - 30);
    document.getElementById('logTo').value   = today.toISOString().slice(0,10);
    document.getElementById('logFrom').value = from.toISOString().slice(0,10);
    applyLogFilter();
  }

  function applyLogFilter() {
    var area = document.getElementById('logTableArea');
    area.innerHTML = '<div class="log-empty">⏳ กำลังโหลด...</div>';

    apiCall('getMemberActivityLog', {
      userId: document.getElementById('logFilterUser').value  || undefined,
      action: document.getElementById('logFilterAction').value || undefined,
      from:   document.getElementById('logFrom').value         || undefined,
      to:     document.getElementById('logTo').value           || undefined,
      limit: 2000
    }, function(r) {
      if (!r || !r.success) {
        area.innerHTML = '<div class="log-empty">⚠️ โหลดข้อมูลไม่ได้</div>';
        return;
      }
      _logData = r.data || [];
      renderLog(_logData);
    });
  }

  function renderLog(rows) {
    var area = document.getElementById('logTableArea');
    if (!rows.length) {
      area.innerHTML = '<div class="log-empty">📭 ไม่มีบันทึกในช่วงที่เลือก</div>';
      return;
    }
    var html = '<table class="log-tbl"><thead><tr>' +
      '<th>วันเวลา</th><th>สมาชิก</th><th>ประเภทงาน</th><th>เป้าหมาย</th><th>คะแนน</th>' +
      '</tr></thead><tbody>';
    rows.forEach(function(r) {
      var cls = ACTION_CLASS[r.action] || 'act-edit';
      html += '<tr>' +
        '<td style="white-space:nowrap;color:var(--premium-text-muted)">' + fmtDt(r.createdAt) + '</td>' +
        '<td style="font-weight:600">' + esc(r.userName) + '</td>' +
        '<td><span class="act-badge ' + cls + '">' + esc(r.actionLabel || ACTION_LABELS[r.action] || r.action) + '</span></td>' +
        '<td style="max-width:220px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap">' + esc(r.targetName || '—') + '</td>' +
        '<td><span class="score-pill">' + (r.score || 1) + '</span></td>' +
      '</tr>';
    });
    html += '</tbody></table>';
    area.innerHTML = html;
  }

  function exportCsv() {
    if (!_logData.length) { alert('ไม่มีข้อมูลให้ Export — คลิก กรอง ก่อน'); return; }
    var BOM = '\uFEFF';
    var header = 'วันที่เวลา,สมาชิก,ประเภทงาน,ชื่อเพลง/ศิลปิน,คะแนน';
    var rows = _logData.map(function(r) {
      return [fmtDt(r.createdAt), r.userName||'', r.actionLabel||ACTION_LABELS[r.action]||r.action, r.targetName||'', r.score||1]
        .map(function(v){ return '"' + String(v).replace(/"/g,'""') + '"'; }).join(',');
    });
    var csv    = BOM + header + '\n' + rows.join('\n');
    var blob   = new Blob([csv], {type:'text/csv;charset=utf-8'});
    var url    = URL.createObjectURL(blob);
    var a      = document.createElement('a');
    a.href     = url; a.download = 'worklog-' + new Date().toISOString().slice(0,10) + '.csv';
    a.click(); URL.revokeObjectURL(url);
  }

  // ── Init ───────────────────────────────────────────────────────
  document.addEventListener('DOMContentLoaded', function() {
    requireAuth();
    checkAdGate();
    renderMainNav('mainNav');
    applyTranslations();
    loadStats();
  });
  </script>
</body>
</html>
