<!DOCTYPE html>
<html lang="th">
<head>
  <meta charset="UTF-8">
  <meta name="google-adsense-account" content="ca-pub-6824376916256036">
  <script async src="https://pagead2.googlesyndication.com/pagead/js/adsbygoogle.js?client=ca-pub-6824376916256036" crossorigin="anonymous"></script>
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
  <link rel="manifest" href="manifest.json">
  <link rel="apple-touch-icon" sizes="180x180" href="icons/apple-touch-icon-180.png">
  <link rel="icon" type="image/png" sizes="32x32" href="icons/favicon-32.png">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="theme-color" content="#1a1a1a">
  <title>กองกลางวง — BandThai</title>
  <link href="https://fonts.googleapis.com/css2?family=Kanit:wght@400;600;700&family=Sarabun:wght@400;500;600&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="css/theme.css">
  <link rel="stylesheet" href="css/nav.css">
  <link rel="stylesheet" href="css/compat.css">
  <style>
    /* ── Summary bar ── */
    .fund-summary { display: grid; grid-template-columns: repeat(3, 1fr); gap: var(--spacing-lg); margin-bottom: var(--spacing-xl); }
    .fund-summary-card { border-radius: var(--radius-lg); padding: var(--spacing-lg) var(--spacing-xl); text-align: center; }
    .fund-summary-card.balance { background: linear-gradient(135deg, #1a1a2e, #16213e); color: #fff; }
    .fund-summary-card.income  { background: linear-gradient(135deg, #f0fff4, #c6f6d5); }
    .fund-summary-card.expense { background: linear-gradient(135deg, #fff5f5, #fed7d7); }
    .fund-summary-card .s-label { font-size: var(--text-xs); font-weight: 600; letter-spacing: .06em; text-transform: uppercase; margin-bottom: 4px; opacity: .7; }
    .fund-summary-card.balance .s-label { color: rgba(255,255,255,.65); }
    .fund-summary-card.income  .s-label { color: #276749; }
    .fund-summary-card.expense .s-label { color: #c53030; }
    .fund-summary-card .s-val  { font-size: var(--text-2xl); font-weight: 700; }
    .fund-summary-card.balance .s-val  { color: var(--premium-gold); }
    .fund-summary-card.income  .s-val  { color: #276749; }
    .fund-summary-card.expense .s-val  { color: #c53030; }
    /* ── Tabs ── */
    .fund-tabs { display: flex; gap: 4px; border-bottom: 2px solid var(--premium-border); margin-bottom: var(--spacing-xl); }
    .fund-tab  { padding: 10px 20px; font-size: var(--text-sm); font-weight: 600; color: var(--premium-text-muted); cursor: pointer; border-bottom: 2px solid transparent; margin-bottom: -2px; transition: color .15s, border-color .15s; display: flex; align-items: center; gap: 6px; border-radius: var(--radius-md) var(--radius-md) 0 0; background: none; border-top: none; border-left: none; border-right: none; }
    .fund-tab:hover  { color: var(--premium-text); background: var(--premium-off-white); }
    .fund-tab.active { color: var(--premium-gold); border-bottom-color: var(--premium-gold); }
    .tab-badge { background: #e53e3e; color: #fff; font-size: 10px; font-weight: 700; padding: 1px 6px; border-radius: var(--radius-full); min-width: 18px; text-align: center; }
    .tab-pane  { display: none; }
    .tab-pane.active { display: block; }
    /* ── Ledger table ── */
    .ledger-table { width: 100%; border-collapse: separate; border-spacing: 0; }
    .ledger-table th { background: var(--premium-off-white); font-size: var(--text-xs); font-weight: 700; text-transform: uppercase; letter-spacing: .05em; color: var(--premium-text-muted); padding: 10px 14px; border-bottom: 2px solid var(--premium-border); white-space: nowrap; }
    .ledger-table td { padding: 11px 14px; border-bottom: 1px solid var(--premium-border); font-size: var(--text-sm); vertical-align: middle; }
    .ledger-table tr:last-child td { border-bottom: none; }
    .ledger-table tr:hover td { background: var(--premium-off-white); }
    .type-income  { color: #276749; font-weight: 700; }
    .type-expense { color: #c53030; font-weight: 700; }
    .amount-income  { color: #276749; font-weight: 700; }
    .amount-expense { color: #c53030; font-weight: 700; }
    /* ── Status badges ── */
    .status-badge { display: inline-flex; align-items: center; gap: 4px; font-size: 11px; font-weight: 700; padding: 2px 10px; border-radius: var(--radius-full); }
    .status-approved { background: #c6f6d5; color: #276749; }
    .status-pending  { background: #fefcbf; color: #744210; }
    .status-rejected { background: #fed7d7; color: #9b2c2c; }
    /* ── Pending cards ── */
    .pending-card { border: 1px solid var(--premium-border); border-radius: var(--radius-lg); padding: var(--spacing-md) var(--spacing-lg); margin-bottom: var(--spacing-md); background: #fff; }
    .pending-card-header { display: flex; align-items: center; justify-content: space-between; flex-wrap: wrap; gap: 8px; margin-bottom: 8px; }
    .pending-card-meta   { font-size: var(--text-xs); color: var(--premium-text-muted); display: flex; flex-wrap: wrap; gap: 10px; }
    .pending-card-actions { display: flex; gap: 8px; }
    /* ── Form ── */
    .form-grid-3 { display: grid; grid-template-columns: repeat(auto-fit, minmax(160px, 1fr)); gap: var(--spacing-md); }
    .submit-info  { background: #ebf8ff; border-left: 4px solid #3182ce; border-radius: 0 var(--radius-md) var(--radius-md) 0; padding: var(--spacing-md); font-size: var(--text-sm); margin-bottom: var(--spacing-md); }
    .submit-info.manager-info { background: #f0fff4; border-left-color: #48bb78; }
    .btn-success { background: #48bb78; color: #fff; border: none; }
    .btn-success:hover { background: #38a169; }
    @media (max-width: 600px) {
      .fund-summary { grid-template-columns: 1fr; }
      .fund-tabs    { overflow-x: auto; }
    }
  </style>
</head>
<body>
  <div id="mainNav"></div>
  <div id="toast"></div>
  <div id="confirmModal"></div>

  <main>
    <div class="container">
      <div class="page-header">
        <h1 class="page-title">💰 กองกลางวง</h1>
        <button class="btn btn-secondary" onclick="window.print()">🖨️ พิมพ์</button>
      </div>

      <!-- ── Summary ── -->
      <div class="fund-summary">
        <div class="fund-summary-card balance">
          <div class="s-label">ยอดคงเหลือ</div>
          <div class="s-val" id="sBalance">฿ 0</div>
        </div>
        <div class="fund-summary-card income">
          <div class="s-label">รายรับทั้งหมด</div>
          <div class="s-val" id="sIncome">฿ 0</div>
        </div>
        <div class="fund-summary-card expense">
          <div class="s-label">รายจ่ายทั้งหมด</div>
          <div class="s-val" id="sExpense">฿ 0</div>
        </div>
      </div>

      <!-- ── Tabs ── -->
      <div class="fund-tabs">
        <button class="fund-tab active" onclick="switchTab('ledger',this)">📒 บัญชีรายการ</button>
        <button class="fund-tab" onclick="switchTab('pending',this)">⏳ รออนุมัติ <span class="tab-badge" id="pendingBadge" style="display:none">0</span></button>
        <button class="fund-tab" onclick="switchTab('add',this)">➕ บันทึกรายการ</button>
      </div>

      <!-- ── Tab: Ledger ── -->
      <div id="tabLedger" class="tab-pane active">
        <div class="card">
          <div class="card-header" style="flex-wrap:wrap;gap:var(--spacing-md)">
            <h3 class="card-title">รายการที่อนุมัติแล้ว</h3>
            <div style="display:flex;gap:var(--spacing-sm);flex-wrap:wrap">
              <select id="ledgerTypeFilter" onchange="renderLedger()">
                <option value="">ทั้งหมด</option>
                <option value="income">รายรับ</option>
                <option value="expense">รายจ่าย</option>
              </select>
              <select id="ledgerMonthFilter" onchange="renderLedger()">
                <option value="">ทุกเดือน</option>
              </select>
            </div>
          </div>
          <div class="table-responsive">
            <table class="ledger-table">
              <thead>
                <tr>
                  <th>วันที่</th>
                  <th>ประเภท</th>
                  <th>หมวดหมู่</th>
                  <th>รายละเอียด</th>
                  <th>ผู้บันทึก</th>
                  <th style="text-align:right">จำนวน (บาท)</th>
                  <th style="text-align:right">คงเหลือสะสม</th>
                  <th id="ledgerDeleteCol"></th>
                </tr>
              </thead>
              <tbody id="ledgerBody">
                <tr><td colspan="8" class="text-center" style="padding:24px;color:var(--premium-text-muted)">กำลังโหลด...</td></tr>
              </tbody>
            </table>
          </div>
        </div>
      </div>

      <!-- ── Tab: Pending ── -->
      <div id="tabPending" class="tab-pane">
        <div id="pendingList">
          <div style="text-align:center;padding:40px;color:var(--premium-text-muted)">กำลังโหลด...</div>
        </div>
      </div>

      <!-- ── Tab: Add ── -->
      <div id="tabAdd" class="tab-pane">
        <div class="card">
          <div class="card-header"><h3 class="card-title">บันทึกรายการใหม่</h3></div>
          <div class="submit-info" id="submitInfoBox">
            ⏳ รายการที่คุณบันทึกจะส่งให้ผู้จัดการวงอนุมัติก่อน จึงจะเข้าบัญชีกองกลาง
          </div>
          <form id="fundForm">
            <!-- Row 1: ประเภท / จำนวน / วันที่ -->
            <div class="form-grid-3">
              <div class="form-group">
                <label>ประเภท *</label>
                <select id="txType" onchange="onTypeChange()">
                  <option value="income">💚 รายรับ</option>
                  <option value="expense">❤️ รายจ่าย</option>
                </select>
              </div>
              <div class="form-group">
                <label>จำนวน (บาท) *</label>
                <input type="number" id="txAmount" min="0.01" step="0.01" placeholder="0.00" required>
              </div>
              <div class="form-group">
                <label>วันที่ *</label>
                <input type="date" id="txDate" required>
              </div>
            </div>

            <!-- ── Income fields ── -->
            <div id="incomeFields">
              <div class="form-group">
                <label>🏪 Tip จากร้าน</label>
                <div style="display:flex;gap:8px;align-items:center">
                  <select id="txVenueSelect" style="flex:1" onchange="onVenueSelect()">
                    <option value="">— พิมพ์ชื่อร้านด้านล่าง หรือเลือกจากรายการ —</option>
                  </select>
                </div>
                <input type="text" id="txVenueName" placeholder="ชื่อร้าน / แหล่งที่มาของ Tip (พิมพ์เองได้)" style="margin-top:6px">
              </div>
              <div class="form-group">
                <label>หมายเหตุเพิ่มเติม</label>
                <input type="text" id="txIncomeNote" placeholder="เช่น ค่ำคืนพิเศษ, วันหยุด... (ไม่บังคับ)">
              </div>
            </div>

            <!-- ── Expense fields ── -->
            <div id="expenseFields" style="display:none">
              <div class="form-grid-3">
                <div class="form-group" style="grid-column:1/-1">
                  <label>🧾 จ่ายอะไร *</label>
                  <input type="text" id="txExpenseWhat" placeholder="เช่น ซื้อสาย Guitar, ค่าน้ำมันรถ, ค่าอาหารซ้อม...">
                </div>
              </div>
              <div class="form-group">
                <label>หมวดหมู่</label>
                <select id="txCategory">
                  <option value="ค่าซ้อม">ค่าซ้อม</option>
                  <option value="อุปกรณ์">อุปกรณ์</option>
                  <option value="ค่าเดินทาง">ค่าเดินทาง</option>
                  <option value="ค่าอาหาร">ค่าอาหาร</option>
                  <option value="ค่าเช่าสถานที่">ค่าเช่าสถานที่</option>
                  <option value="กองกลาง">กองกลาง</option>
                  <option value="อื่นๆ">อื่นๆ</option>
                </select>
              </div>
            </div>

            <div style="display:flex;justify-content:flex-end;margin-top:var(--spacing-md)">
              <button type="submit" class="btn btn-primary" id="saveTxBtn">📤 ส่งคำขอ</button>
            </div>
          </form>
        </div>
      </div>
    </div>
  </main>

  <!-- Reject Modal -->
  <div id="rejectModal" class="modal-backdrop" style="display:none">
    <div class="modal" style="max-width:420px">
      <div class="modal-header">
        <h3 class="modal-title">❌ ปฏิเสธรายการ</h3>
        <button class="modal-close" onclick="closeRejectModal()">×</button>
      </div>
      <div class="form-group" style="padding:var(--spacing-lg)">
        <label>เหตุผลที่ปฏิเสธ</label>
        <textarea id="rejectReason" rows="3" placeholder="ระบุเหตุผล..." style="width:100%;resize:vertical"></textarea>
      </div>
      <div style="display:flex;justify-content:flex-end;gap:var(--spacing-sm);padding:0 var(--spacing-lg) var(--spacing-lg)">
        <button class="btn btn-secondary" onclick="closeRejectModal()">ยกเลิก</button>
        <button class="btn btn-danger" onclick="confirmReject()">ยืนยันปฏิเสธ</button>
      </div>
    </div>
  </div>

  <script src="js/i18n.js"></script>
  <script src="js/app.js"></script>
  <script src="js/nav.js?v=20260317"></script>
  <script>
  var _allTx      = [];
  var _isManager  = false;
  var _rejectTarget = null;
  var _venues     = [];

  document.addEventListener('DOMContentLoaded', function() {
    requireAuth();
      checkAdGate();
    renderMainNav('mainNav');
    applyTranslations();

    var role = localStorage.getItem('userRole') || 'member';
    _isManager = (role === 'admin' || role === 'manager');

    if (_isManager) {
      document.getElementById('submitInfoBox').className = 'submit-info manager-info';
      document.getElementById('submitInfoBox').textContent = '✅ ในฐานะผู้จัดการวง รายการที่คุณบันทึกจะเข้าบัญชีทันทีโดยไม่ต้องรออนุมัติ';
      document.getElementById('saveTxBtn').textContent = '💾 บันทึก';
    }

    document.getElementById('txDate').value = (function(d){ return d.getFullYear() + '-' + String(d.getMonth()+1).padStart(2,'0') + '-' + String(d.getDate()).padStart(2,'0'); })(new Date());
    apiCall('getBandSettings', {}, function(r) {
      if (r && r.success && r.data && r.data.venues) {
        _venues = r.data.venues;
      }
      populateVenueSelect();
    });

    loadFund();
  });

  /* ── Load ── */
  function loadFund() {
    apiCall('getFundTransactions', {}, function(r) {
      if (!(r && r.success)) { showToast('โหลดข้อมูลไม่สำเร็จ', 'error'); return; }
      _allTx = r.data.transactions || [];

      document.getElementById('sBalance').textContent  = formatCurrency(r.data.balance || 0);
      document.getElementById('sIncome').textContent   = formatCurrency(r.data.totalIncome || 0);
      document.getElementById('sExpense').textContent  = formatCurrency(r.data.totalExpense || 0);

      var pendingCount = _allTx.filter(function(t){ return t.status === 'pending'; }).length;
      var badge = document.getElementById('pendingBadge');
      if (pendingCount > 0) { badge.style.display = ''; badge.textContent = pendingCount; }
      else { badge.style.display = 'none'; }

      populateMonthFilter();
      renderLedger();
      renderPending();
    });
  }

  /* ── Month filter ── */
  function populateMonthFilter() {
    var approved = _allTx.filter(function(t){ return t.status === 'approved' || !t.status; });
    var months = {};
    approved.forEach(function(t) {
      var m = (t.date || '').substring(0, 7);
      if (m) months[m] = true;
    });
    var sel = document.getElementById('ledgerMonthFilter');
    var cur = sel.value;
    while (sel.options.length > 1) sel.remove(1);
    Object.keys(months).sort().reverse().forEach(function(m) {
      var parts = m.split('-');
      var label = 'เดือน ' + parseInt(parts[1]) + '/' + (parseInt(parts[0]) + 543);
      var opt = document.createElement('option');
      opt.value = m; opt.textContent = label;
      sel.appendChild(opt);
    });
    if (cur) sel.value = cur;
  }

  /* ── Ledger Tab ── */
  function renderLedger() {
    var typeFilter  = document.getElementById('ledgerTypeFilter').value;
    var monthFilter = document.getElementById('ledgerMonthFilter').value;

    var rows = _allTx.filter(function(t) {
      if (t.status !== 'approved' && t.status) return false;
      if (typeFilter && t.type !== typeFilter) return false;
      if (monthFilter && !(t.date || '').startsWith(monthFilter)) return false;
      return true;
    });
    rows.sort(function(a, b){ return (a.date||'').localeCompare(b.date||''); });

    var running = 0;
    var tbody = document.getElementById('ledgerBody');
    if (!rows.length) {
      tbody.innerHTML = '<tr><td colspan="8" class="text-center" style="padding:24px;color:var(--premium-text-muted)">ยังไม่มีรายการ</td></tr>';
      return;
    }

    tbody.innerHTML = rows.map(function(tx) {
      var isIncome = tx.type === 'income';
      running += isIncome ? (tx.amount || 0) : -(tx.amount || 0);
      var sign   = isIncome ? '+' : '-';
      var amtCls = isIncome ? 'amount-income' : 'amount-expense';
      var runCls = running >= 0 ? 'amount-income' : 'amount-expense';
      var delBtn = _isManager
        ? '<button class="btn btn-ghost btn-sm" onclick="deleteTx(\'' + escapeHtml(tx.id||'') + '\')" title="ลบ">🗑️</button>'
        : '';
      return '<tr>'
        + '<td style="white-space:nowrap">' + escapeHtml(formatDate(tx.date||'')) + '</td>'
        + '<td><span class="type-' + tx.type + '">' + (isIncome ? '💚 รายรับ' : '❤️ รายจ่าย') + '</span></td>'
        + '<td>' + escapeHtml(tx.category||'-') + '</td>'
        + '<td>' + escapeHtml(tx.description||'') + '</td>'
        + '<td style="color:var(--premium-text-muted);font-size:11px">' + escapeHtml(tx.submittedBy||'-') + '</td>'
        + '<td class="' + amtCls + '" style="text-align:right;white-space:nowrap">' + sign + formatCurrency(tx.amount||0) + '</td>'
        + '<td class="' + runCls + '" style="text-align:right;white-space:nowrap;font-weight:700">' + formatCurrency(running) + '</td>'
        + '<td>' + delBtn + '</td>'
        + '</tr>';
    }).join('');
  }

  /* ── Pending Tab ── */
  function renderPending() {
    var pending  = _allTx.filter(function(t){ return t.status === 'pending'; });
    var rejected = _allTx.filter(function(t){ return t.status === 'rejected'; });
    var container = document.getElementById('pendingList');

    if (!pending.length && !rejected.length) {
      container.innerHTML = '<div style="text-align:center;padding:40px;color:var(--premium-text-muted)">ไม่มีรายการรออนุมัติ ✅</div>';
      return;
    }

    var html = '';

    if (pending.length) {
      html += '<h4 style="margin-bottom:var(--spacing-md)">⏳ รอการอนุมัติ (' + pending.length + ' รายการ)</h4>';
      html += pending.sort(function(a,b){ return (b.date||'').localeCompare(a.date||''); }).map(function(tx) {
        var isIncome = tx.type === 'income';
        var approveBtn = _isManager
          ? '<button class="btn btn-success btn-sm" onclick="approveTx(\'' + escapeHtml(tx.id||'') + '\')">✅ อนุมัติ</button>'
            + '<button class="btn btn-danger btn-sm" onclick="openRejectModal(\'' + escapeHtml(tx.id||'') + '\')">❌ ปฏิเสธ</button>'
          : '';
        return '<div class="pending-card">'
          + '<div class="pending-card-header">'
            + '<div>'
              + '<span class="type-' + tx.type + '">' + (isIncome ? '💚 รายรับ' : '❤️ รายจ่าย') + '</span>'
              + ' &nbsp;<strong>' + formatCurrency(tx.amount||0) + '</strong>'
              + ' &nbsp;<span class="status-badge status-pending">⏳ รออนุมัติ</span>'
            + '</div>'
            + '<div class="pending-card-actions">' + approveBtn + '</div>'
          + '</div>'
          + '<div class="pending-card-meta">'
            + '<span>📅 ' + escapeHtml(formatDate(tx.date||'')) + '</span>'
            + '<span>🗂️ ' + escapeHtml(tx.category||'-') + '</span>'
            + '<span>👤 ' + escapeHtml(tx.submittedBy||'-') + '</span>'
          + '</div>'
          + (tx.description ? '<div style="margin-top:6px;font-size:var(--text-sm)">' + escapeHtml(tx.description) + '</div>' : '')
          + '</div>';
      }).join('');
    }

    if (rejected.length) {
      html += '<h4 style="margin:var(--spacing-xl) 0 var(--spacing-md)">❌ ปฏิเสธแล้ว (' + rejected.length + ' รายการ)</h4>';
      html += rejected.sort(function(a,b){ return (b.date||'').localeCompare(a.date||''); }).map(function(tx) {
        var isIncome = tx.type === 'income';
        var delBtn = _isManager
          ? '<button class="btn btn-ghost btn-sm" onclick="deleteTx(\'' + escapeHtml(tx.id||'') + '\')">🗑️</button>'
          : '';
        return '<div class="pending-card" style="opacity:.75">'
          + '<div class="pending-card-header">'
            + '<div>'
              + '<span class="type-' + tx.type + '">' + (isIncome ? '💚 รายรับ' : '❤️ รายจ่าย') + '</span>'
              + ' &nbsp;<strong>' + formatCurrency(tx.amount||0) + '</strong>'
              + ' &nbsp;<span class="status-badge status-rejected">❌ ปฏิเสธ</span>'
            + '</div>'
            + '<div class="pending-card-actions">' + delBtn + '</div>'
          + '</div>'
          + '<div class="pending-card-meta">'
            + '<span>📅 ' + escapeHtml(formatDate(tx.date||'')) + '</span>'
            + '<span>👤 ' + escapeHtml(tx.submittedBy||'-') + '</span>'
            + (tx.rejectReason ? '<span>เหตุผล: ' + escapeHtml(tx.rejectReason) + '</span>' : '')
          + '</div>'
          + (tx.description ? '<div style="margin-top:6px;font-size:var(--text-sm)">' + escapeHtml(tx.description) + '</div>' : '')
          + '</div>';
      }).join('');
    }

    container.innerHTML = html;
  }

  /* ── Tab switch ── */
  function switchTab(name, btn) {
    document.querySelectorAll('.tab-pane').forEach(function(p){ p.classList.remove('active'); });
    document.querySelectorAll('.fund-tab').forEach(function(b){ b.classList.remove('active'); });
    document.getElementById('tab' + name.charAt(0).toUpperCase() + name.slice(1)).classList.add('active');
    btn.classList.add('active');
  }

  /* ── Venue select ── */
  function populateVenueSelect() {
    var sel = document.getElementById('txVenueSelect');
    // ลบ options เก่า (เก็บ option แรก)
    while (sel.options.length > 1) sel.remove(1);
    _venues.forEach(function(v) {
      var opt = document.createElement('option');
      opt.value = v.name || v.id || '';
      opt.textContent = '🏪 ' + (v.name || '');
      sel.appendChild(opt);
    });
  }

  function onVenueSelect() {
    var sel = document.getElementById('txVenueSelect');
    var nameInput = document.getElementById('txVenueName');
    if (sel.value) nameInput.value = sel.value;
  }

  /* ── Type toggle ── */
  function onTypeChange() {
    var type = document.getElementById('txType').value;
    document.getElementById('incomeFields').style.display  = type === 'income'  ? '' : 'none';
    document.getElementById('expenseFields').style.display = type === 'expense' ? '' : 'none';
    // ล้างค่า
    document.getElementById('txVenueName').value   = '';
    document.getElementById('txVenueSelect').value = '';
    if (document.getElementById('txExpenseWhat')) document.getElementById('txExpenseWhat').value = '';
  }

  /* ── Submit form ── */
  document.getElementById('fundForm').addEventListener('submit', function(e) {
    e.preventDefault();
    var type = document.getElementById('txType').value;

    // validate
    if (type === 'income') {
      var vname = document.getElementById('txVenueName').value.trim();
      if (!vname) {
        showToast('กรุณาระบุชื่อร้าน / แหล่งที่มาของ Tip', 'error');
        document.getElementById('txVenueName').focus();
        return;
      }
    } else {
      var what = document.getElementById('txExpenseWhat').value.trim();
      if (!what) {
        showToast('กรุณาระบุว่าจ่ายอะไร', 'error');
        document.getElementById('txExpenseWhat').focus();
        return;
      }
    }

    var btn = document.getElementById('saveTxBtn');
    btn.disabled = true; btn.textContent = 'กำลังส่ง...';
    var userName = localStorage.getItem('userNickname') || localStorage.getItem('userFirstName') || localStorage.getItem('userName') || '';

    var category, description;
    if (type === 'income') {
      var venueName = document.getElementById('txVenueName').value.trim();
      var incomeNote = document.getElementById('txIncomeNote').value.trim();
      category    = 'Tip';
      description = 'Tip จากร้าน ' + venueName + (incomeNote ? ' — ' + incomeNote : '');
    } else {
      category    = document.getElementById('txCategory').value;
      var expWhat = document.getElementById('txExpenseWhat').value.trim();
      description = expWhat;
    }

    apiCall('addFundTransaction', {
      type:        type,
      amount:      document.getElementById('txAmount').value,
      date:        document.getElementById('txDate').value,
      category:    category,
      description: description,
      submittedBy: userName
    }, function(r) {
      btn.disabled = false;
      btn.textContent = _isManager ? '💾 บันทึก' : '📤 ส่งคำขอ';
      if (r && r.success) {
        var msg = r.autoApproved ? 'บันทึกแล้ว ✅' : 'ส่งคำขอแล้ว ⏳ รอผู้จัดการอนุมัติ';
        showToast(msg, 'success');
        document.getElementById('fundForm').reset();
        document.getElementById('txDate').value = (function(d){ return d.getFullYear() + '-' + String(d.getMonth()+1).padStart(2,'0') + '-' + String(d.getDate()).padStart(2,'0'); })(new Date());
        onTypeChange(); // reset dynamic fields
        loadFund();
        if (!r.autoApproved) {
          var pendingBtn = document.querySelectorAll('.fund-tab')[1];
          switchTab('pending', pendingBtn);
        }
      } else {
        showToast((r && r.message) || 'เกิดข้อผิดพลาด', 'error');
      }
    });
  });

  /* ── Approve ── */
  function approveTx(id) {
    apiCall('approveFundTransaction', { txId: id }, function(r) {
      if (r && r.success) { showToast('อนุมัติแล้ว ✅', 'success'); loadFund(); }
      else showToast((r && r.message)||'เกิดข้อผิดพลาด', 'error');
    });
  }

  /* ── Reject Modal ── */
  function openRejectModal(id) {
    _rejectTarget = id;
    document.getElementById('rejectReason').value = '';
    document.getElementById('rejectModal').style.display = 'flex';
  }
  function closeRejectModal() {
    _rejectTarget = null;
    document.getElementById('rejectModal').style.display = 'none';
  }
  function confirmReject() {
    if (!_rejectTarget) return;
    var reason = document.getElementById('rejectReason').value.trim();
    apiCall('rejectFundTransaction', { txId: _rejectTarget, reason: reason }, function(r) {
      if (r && r.success) { showToast('ปฏิเสธรายการแล้ว', 'warning'); loadFund(); closeRejectModal(); }
      else showToast((r && r.message)||'เกิดข้อผิดพลาด', 'error');
    });
  }

  /* ── Delete (manager only) ── */
  function deleteTx(id) {
    showConfirm('ยืนยันการลบ', 'ต้องการลบรายการนี้?', {danger:true, confirmText:'ลบ'}).then(function(ok) {
      if (!ok) return;
      apiCall('deleteFundTransaction', { txId: id }, function(r) {
        if (r && r.success) { showToast('ลบแล้ว', 'success'); loadFund(); }
        else showToast((r && r.message)||'เกิดข้อผิดพลาด', 'error');
      });
    });
  }
  </script>
</body>
</html>
