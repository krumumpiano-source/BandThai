<!DOCTYPE html>
<html lang="th">
<head>
  <meta charset="UTF-8">
  <meta name="google-adsense-account" content="ca-pub-6824376916256036">
  <script async src="https://pagead2.googlesyndication.com/pagead/js/adsbygoogle.js?client=ca-pub-6824376916256036" crossorigin="anonymous"></script>
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <link rel="manifest" href="manifest.json">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="theme-color" content="#1a1a1a">
  <title>อุปกรณ์วง — Band Management By SoulCiety</title>
  <link href="https://fonts.googleapis.com/css2?family=Kanit:wght@400;600;700&family=Sarabun:wght@400;500;600&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="css/theme.css">
  <link rel="stylesheet" href="css/nav.css">
  <link rel="stylesheet" href="css/compat.css">
  <style>
    /* ── Filter bar ── */
    .type-tabs{display:flex;gap:8px;flex-wrap:wrap;margin-bottom:var(--spacing-lg)}
    .type-tab{padding:6px 16px;border-radius:var(--radius-full);border:1.5px solid var(--premium-border);background:#fff;font-size:var(--text-sm);font-weight:600;cursor:pointer;transition:.15s;white-space:nowrap}
    .type-tab.active,.type-tab:hover{background:var(--premium-gold);color:#fff;border-color:var(--premium-gold)}

    /* ── Summary bar ── */
    .summary-bar{display:flex;gap:var(--spacing-md);flex-wrap:wrap;margin-bottom:var(--spacing-lg)}
    .summary-chip{background:#fff;border-radius:var(--radius-lg);box-shadow:var(--shadow-sm);padding:var(--spacing-md) var(--spacing-lg);display:flex;align-items:center;gap:var(--spacing-sm);flex:1;min-width:140px}
    .summary-chip .ico{font-size:24px}
    .summary-chip .val{font-size:var(--text-lg);font-weight:700;color:var(--premium-text)}
    .summary-chip .lbl{font-size:var(--text-xs);color:var(--premium-text-muted)}

    /* ── Card grid ── */
    .equip-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(260px,1fr));gap:var(--spacing-lg)}

    /* ── Equipment card ── */
    .equip-card{background:#fff;border-radius:var(--radius-lg);box-shadow:var(--shadow-sm);overflow:hidden;cursor:pointer;transition:transform .15s,box-shadow .15s;display:flex;flex-direction:column}
    .equip-card:hover{transform:translateY(-2px);box-shadow:var(--shadow-md)}
    .equip-card-img{width:100%;height:180px;object-fit:cover;background:var(--premium-off-white);display:flex;align-items:center;justify-content:center;font-size:48px;color:var(--premium-text-muted);flex-shrink:0}
    .equip-card-img img{width:100%;height:100%;object-fit:cover;display:block}
    .equip-card-body{padding:var(--spacing-md);flex:1;display:flex;flex-direction:column;gap:4px}
    .equip-card-name{font-weight:700;font-size:var(--text-base);color:var(--premium-text);line-height:1.3}
    .equip-card-sub{font-size:var(--text-xs);color:var(--premium-text-muted)}
    .equip-card-meta{display:flex;align-items:center;gap:6px;flex-wrap:wrap;margin-top:4px}
    .equip-card-price{font-size:var(--text-sm);font-weight:700;color:var(--premium-gold);margin-top:4px}
    .equip-card-source{font-size:var(--text-xs);color:var(--premium-text-muted);margin-top:2px}

    /* ── Status / Type ── */
    .status-chip{padding:2px 10px;border-radius:var(--radius-full);font-size:11px;font-weight:600}
    .status-chip.normal{background:#c6f6d5;color:#276749}
    .status-chip.repair{background:#fefcbf;color:#d69e2e}
    .status-chip.broken{background:#fed7d7;color:#c53030}
    .type-badge{padding:2px 10px;border-radius:var(--radius-full);font-size:11px;font-weight:600;background:var(--premium-off-white);color:var(--premium-text-muted);border:1px solid var(--premium-border)}

    /* ── Fund chips ── */
    .fund-กองกลาง{background:#e9d8fd;color:#553c9a;padding:2px 8px;border-radius:var(--radius-full);font-size:11px;font-weight:600}
    .fund-ส่วนตัว{background:#bee3f8;color:#2b6cb0;padding:2px 8px;border-radius:var(--radius-full);font-size:11px;font-weight:600}
    .fund-อื่นๆ{background:#e2e8f0;color:#4a5568;padding:2px 8px;border-radius:var(--radius-full);font-size:11px;font-weight:600}

    /* ── Image upload zone ── */
    .img-upload-zone{border:2px dashed var(--premium-border);border-radius:var(--radius-lg);padding:var(--spacing-lg);text-align:center;cursor:pointer;transition:border-color .15s;position:relative;overflow:hidden;min-height:140px;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:8px;background:var(--premium-off-white)}
    .img-upload-zone:hover,.img-upload-zone.drag{border-color:var(--premium-gold);background:#fffbf0}
    .img-upload-zone input[type="file"]{position:absolute;inset:0;opacity:0;cursor:pointer}
    .img-upload-zone .preview-img{width:100%;max-height:200px;object-fit:contain;border-radius:var(--radius-md)}
    .img-upload-zone .upload-icon{font-size:36px}
    .img-upload-zone .upload-txt{font-size:var(--text-sm);color:var(--premium-text-muted)}
    .img-remove-btn{position:absolute;top:8px;right:8px;background:rgba(0,0,0,.5);color:#fff;border:none;border-radius:50%;width:28px;height:28px;font-size:14px;cursor:pointer;display:flex;align-items:center;justify-content:center;z-index:10}

    @media(max-width:600px){
      .equip-grid{grid-template-columns:1fr 1fr;gap:var(--spacing-sm)}
      .equip-card-img{height:130px}
      .summary-bar{gap:var(--spacing-sm)}
      .summary-chip{min-width:120px;padding:var(--spacing-sm)}
    }
    @media(max-width:380px){ .equip-grid{grid-template-columns:1fr} }
  </style>
</head>
<body>
  <div id="mainNav"></div>
  <div id="toast"></div>
  <div id="confirmModal"></div>

  <!-- ═══════════════ MODAL ═══════════════ -->
  <div id="equipModal" class="modal-backdrop" style="display:none">
    <div class="modal" style="max-width:620px">
      <div class="modal-header">
        <h3 class="modal-title" id="equipModalTitle">เพิ่มอุปกรณ์</h3>
        <button class="modal-close" onclick="closeEquipModal()">×</button>
      </div>
      <form id="equipForm">
        <input type="hidden" id="equipId">
        <input type="hidden" id="eExistingImageUrl">

        <!-- รูปภาพ -->
        <div class="form-group">
          <label>📷 รูปภาพอุปกรณ์</label>
          <div class="img-upload-zone" id="uploadZone" ondragover="onDragOver(event)" ondragleave="onDragLeave(event)" ondrop="onDrop(event)">
            <input type="file" id="eImageFile" accept="image/*" onchange="onImageSelect(event)">
            <div id="uploadPlaceholder" style="display:flex;flex-direction:column;align-items:center;gap:8px">
              <div class="upload-icon">🖼️</div>
              <div class="upload-txt">คลิกหรือลากรูปมาวางที่นี่<br><small>JPG, PNG, WEBP ขนาดไม่เกิน 5 MB</small></div>
            </div>
            <img id="imgPreview" class="preview-img" style="display:none" src="" alt="preview">
            <button type="button" class="img-remove-btn" id="imgRemoveBtn" style="display:none" onclick="removeImage(event)">✕</button>
          </div>
        </div>

        <!-- ชื่อ + ประเภท -->
        <div style="display:grid;grid-template-columns:2fr 1fr;gap:var(--spacing-md)">
          <div class="form-group">
            <label>ชื่ออุปกรณ์ / เครื่องมือ *</label>
            <input type="text" id="eName" placeholder="เช่น กีตาร์ Fender Stratocaster" required>
          </div>
          <div class="form-group">
            <label>ประเภท</label>
            <select id="eType">
              <option value="instrument">🎸 เครื่องดนตรี</option>
              <option value="audio">🔊 เสียง/PA</option>
              <option value="lighting">💡 แสง</option>
              <option value="accessory">🎒 อุปกรณ์เสริม</option>
              <option value="other">📦 อื่นๆ</option>
            </select>
          </div>
        </div>

        <!-- ซื้อจากไหน + วันที่ซื้อ -->
        <div style="display:grid;grid-template-columns:2fr 1fr;gap:var(--spacing-md)">
          <div class="form-group">
            <label>🏪 ซื้อจากร้าน / แหล่งที่มา</label>
            <input type="text" id="ePurchaseSource" placeholder="เช่น ร้านดนตรีเมเจอร์, ซื้อมือสอง Facebook">
          </div>
          <div class="form-group">
            <label>📅 วันที่ซื้อ</label>
            <input type="date" id="ePurchaseDate">
          </div>
        </div>

        <!-- ราคา + เงินจากไหน -->
        <div style="display:grid;grid-template-columns:1fr 1fr;gap:var(--spacing-md)">
          <div class="form-group">
            <label>💰 ราคาที่ซื้อ (บาท)</label>
            <input type="number" id="ePrice" min="0" step="1" placeholder="0">
          </div>
          <div class="form-group">
            <label>🏦 ใช้เงินจาก</label>
            <select id="eFundSource">
              <option value="">— ไม่ระบุ —</option>
              <option value="กองกลาง">🏦 กองกลางวง</option>
              <option value="ส่วนตัว">👤 ส่วนตัว</option>
              <option value="อื่นๆ">📝 อื่นๆ</option>
            </select>
          </div>
        </div>

        <!-- เจ้าของ + Serial -->
        <div style="display:grid;grid-template-columns:1fr 1fr;gap:var(--spacing-md)">
          <div class="form-group">
            <label>👤 เจ้าของ / ผู้ดูแล</label>
            <input type="text" id="eOwner" placeholder="เช่น ชื่อสมาชิก หรือ 'ส่วนกลางวง'">
          </div>
          <div class="form-group">
            <label>🔢 หมายเลข Serial</label>
            <input type="text" id="eSerial" placeholder="(ถ้ามี)">
          </div>
        </div>

        <!-- สถานะ -->
        <div class="form-group">
          <label>สถานะ</label>
          <div style="display:flex;gap:var(--spacing-lg)">
            <label style="display:flex;align-items:center;gap:6px;cursor:pointer"><input type="radio" name="eStatus" value="normal" checked> ✅ ปกติ</label>
            <label style="display:flex;align-items:center;gap:6px;cursor:pointer"><input type="radio" name="eStatus" value="repair"> 🔧 กำลังซ่อม</label>
            <label style="display:flex;align-items:center;gap:6px;cursor:pointer"><input type="radio" name="eStatus" value="broken"> ❌ เสียหาย</label>
          </div>
        </div>

        <!-- หมายเหตุ -->
        <div class="form-group">
          <label>📝 หมายเหตุ</label>
          <textarea id="eNotes" rows="2" placeholder="รายละเอียดเพิ่มเติม, ประกัน, ข้อสังเกต..."></textarea>
        </div>

        <div style="display:flex;justify-content:flex-end;gap:var(--spacing-sm);margin-top:var(--spacing-md)">
          <button type="button" class="btn btn-secondary" onclick="closeEquipModal()">ยกเลิก</button>
          <button type="button" class="btn btn-danger" id="deleteEquipBtn" style="display:none" onclick="deleteCurrentEquip()">ลบ</button>
          <button type="submit" class="btn btn-primary" id="saveEquipBtn">💾 บันทึก</button>
        </div>
      </form>
    </div>
  </div>
  <!-- ════════════════════════════════════ -->

  <main>
    <div class="container">
      <div class="page-header">
        <h1 class="page-title">🎸 อุปกรณ์วง</h1>
        <button class="btn btn-primary" onclick="openEquipModal(null)">+ เพิ่มอุปกรณ์</button>
      </div>

      <!-- Summary -->
      <div class="summary-bar" id="summaryBar" style="display:none">
        <div class="summary-chip">
          <div class="ico">📦</div>
          <div><div class="val" id="sumTotal">0</div><div class="lbl">รายการทั้งหมด</div></div>
        </div>
        <div class="summary-chip">
          <div class="ico">💰</div>
          <div><div class="val" id="sumValue">0</div><div class="lbl">มูลค่ารวม (บาท)</div></div>
        </div>
        <div class="summary-chip">
          <div class="ico">🔧</div>
          <div><div class="val" id="sumRepair">0</div><div class="lbl">กำลังซ่อม</div></div>
        </div>
        <div class="summary-chip">
          <div class="ico">🏦</div>
          <div><div class="val" id="sumFund">0</div><div class="lbl">ซื้อจากกองกลาง</div></div>
        </div>
      </div>

      <!-- Type filter tabs -->
      <div class="type-tabs">
        <div class="type-tab active" onclick="setFilter('all',this)">📋 ทั้งหมด</div>
        <div class="type-tab" onclick="setFilter('instrument',this)">🎸 เครื่องดนตรี</div>
        <div class="type-tab" onclick="setFilter('audio',this)">🔊 เสียง/PA</div>
        <div class="type-tab" onclick="setFilter('lighting',this)">💡 แสง</div>
        <div class="type-tab" onclick="setFilter('accessory',this)">🎒 อุปกรณ์เสริม</div>
        <div class="type-tab" onclick="setFilter('other',this)">📦 อื่นๆ</div>
      </div>

      <!-- Search + status filter -->
      <div style="display:flex;gap:var(--spacing-md);margin-bottom:var(--spacing-lg);flex-wrap:wrap">
        <input type="text" id="equipSearch" placeholder="🔍 ค้นหาชื่ออุปกรณ์, ร้านที่ซื้อ..." oninput="renderEquip()" style="flex:1;min-width:200px">
        <select id="statusFilterEq" onchange="renderEquip()" style="min-width:130px">
          <option value="">ทุกสถานะ</option>
          <option value="normal">✅ ปกติ</option>
          <option value="repair">🔧 ซ่อม</option>
          <option value="broken">❌ เสียหาย</option>
        </select>
      </div>

      <!-- Card grid -->
      <div class="equip-grid" id="equipGrid">
        <div style="grid-column:1/-1;text-align:center;padding:48px 0;color:var(--premium-text-muted)">กำลังโหลด...</div>
      </div>
    </div>
  </main>

  <script src="js/i18n.js"></script>
  <script src="js/app.js"></script>
  <script src="js/nav.js"></script>
  <script>
  /* ════════════════════════════════════════════════════
     Equipment — Band Management By SoulCiety
  ════════════════════════════════════════════════════ */
  var allEquip = [];
  var filterType = 'all';
  var pendingImageFile = null;

  var TYPE_CONFIG = {
    instrument: { label: 'เครื่องดนตรี', icon: '🎸' },
    audio:      { label: 'เสียง/PA',     icon: '🔊' },
    lighting:   { label: 'แสง',           icon: '💡' },
    accessory:  { label: 'อุปกรณ์เสริม',  icon: '🎒' },
    other:      { label: 'อื่นๆ',          icon: '📦' },
  };
  var STATUS_CONFIG = {
    normal: { cls: 'normal', label: '✅ ปกติ' },
    repair: { cls: 'repair', label: '🔧 ซ่อม' },
    broken: { cls: 'broken', label: '❌ เสียหาย' },
  };

  document.addEventListener('DOMContentLoaded', function() {
    requireAuth();
      checkAdGate();
    renderMainNav('mainNav');
    applyTranslations();
    loadEquipment();
  });

  /* ── Load & Render ── */
  function loadEquipment() {
    apiCall('getAllEquipment', {}, function(r) {
      allEquip = (r && r.success && r.data) ? r.data : [];
      renderSummary();
      renderEquip();
    });
  }

  function renderSummary() {
    if (!allEquip.length) { document.getElementById('summaryBar').style.display = 'none'; return; }
    document.getElementById('summaryBar').style.display = 'flex';
    document.getElementById('sumTotal').textContent = allEquip.length;
    var totalVal = allEquip.reduce(function(s, e) { return s + (parseFloat(e.price) || 0); }, 0);
    document.getElementById('sumValue').textContent = formatCurrency(totalVal);
    document.getElementById('sumRepair').textContent = allEquip.filter(function(e) { return e.status === 'repair'; }).length;
    document.getElementById('sumFund').textContent = allEquip.filter(function(e) { return e.fundSource === 'กองกลาง'; }).length;
  }

  function setFilter(type, el) {
    filterType = type;
    document.querySelectorAll('.type-tab').forEach(function(c) { c.classList.remove('active'); });
    el.classList.add('active');
    renderEquip();
  }

  function renderEquip() {
    var q = (document.getElementById('equipSearch').value || '').toLowerCase();
    var st = document.getElementById('statusFilterEq').value;
    var filtered = allEquip.filter(function(e) {
      return (filterType === 'all' || e.type === filterType)
        && (!q || (e.name||'').toLowerCase().includes(q)
                || (e.owner||'').toLowerCase().includes(q)
                || (e.purchaseSource||'').toLowerCase().includes(q))
        && (!st || e.status === st);
    });

    var grid = document.getElementById('equipGrid');
    if (!filtered.length) {
      grid.innerHTML = '<div style="grid-column:1/-1;text-align:center;padding:48px 0;color:var(--premium-text-muted)">ไม่พบรายการ</div>';
      return;
    }
    grid.innerHTML = filtered.map(function(e) { return buildCard(e); }).join('');
  }

  function buildCard(e) {
    var eid = escapeHtml(e.equipmentId || e.id || '');
    var tc = TYPE_CONFIG[e.type] || { label: e.type || '', icon: '📦' };
    var sc = STATUS_CONFIG[e.status] || STATUS_CONFIG.normal;
    var imgHtml = e.imageUrl
      ? '<div class="equip-card-img"><img src="' + escapeHtml(e.imageUrl) + '" alt="" loading="lazy" onerror="this.parentElement.innerHTML=\'<span>' + tc.icon + '</span>\'"></div>'
      : '<div class="equip-card-img">' + tc.icon + '</div>';
    var priceHtml = e.price ? '<div class="equip-card-price">฿' + formatCurrency(parseFloat(e.price)) + '</div>' : '';
    var metaParts = [];
    if (e.purchaseSource) metaParts.push('🏪 ' + escapeHtml(e.purchaseSource));
    if (e.purchaseDate)   metaParts.push('📅 ' + formatDateTH(e.purchaseDate));
    var fundHtml = e.fundSource ? '<span class="fund-' + escapeHtml(e.fundSource) + '">' + escapeHtml(e.fundSource) + '</span>' : '';
    var sourceHtml = (metaParts.length || fundHtml)
      ? '<div class="equip-card-source">' + metaParts.join(' · ') + (metaParts.length && fundHtml ? ' · ' : '') + fundHtml + '</div>'
      : '';
    return '<div class="equip-card" onclick="openEquipModal(\'' + eid + '\')">'
      + imgHtml
      + '<div class="equip-card-body">'
        + '<div class="equip-card-name">' + escapeHtml(e.name || '') + '</div>'
        + (e.owner ? '<div class="equip-card-sub">👤 ' + escapeHtml(e.owner) + '</div>' : '')
        + priceHtml
        + '<div class="equip-card-meta">'
          + '<span class="type-badge">' + tc.icon + ' ' + tc.label + '</span>'
          + '<span class="status-chip ' + sc.cls + '">' + sc.label + '</span>'
        + '</div>'
        + sourceHtml
      + '</div>'
      + '</div>';
  }

  function formatDateTH(dateStr) {
    if (!dateStr) return '';
    var d = new Date(dateStr);
    if (isNaN(d.getTime())) return dateStr;
    var m = ['ม.ค.','ก.พ.','มี.ค.','เม.ย.','พ.ค.','มิ.ย.','ก.ค.','ส.ค.','ก.ย.','ต.ค.','พ.ย.','ธ.ค.'];
    return d.getDate() + ' ' + m[d.getMonth()] + ' ' + (d.getFullYear() + 543);
  }

  /* ── Modal open/close ── */
  function openEquipModal(id) {
    document.getElementById('equipModal').style.display = 'flex';
    document.getElementById('equipForm').reset();
    document.getElementById('equipId').value = '';
    document.getElementById('eExistingImageUrl').value = '';
    document.getElementById('deleteEquipBtn').style.display = 'none';
    document.getElementById('equipModalTitle').textContent = id ? 'แก้ไขอุปกรณ์' : 'เพิ่มอุปกรณ์';
    document.querySelector('input[name="eStatus"][value="normal"]').checked = true;
    clearImagePreview();

    if (id) {
      var e = allEquip.find(function(x) { return (x.equipmentId || x.id) === id; });
      if (e) {
        document.getElementById('equipId').value = e.equipmentId || e.id || '';
        document.getElementById('eName').value = e.name || '';
        document.getElementById('eType').value = e.type || 'instrument';
        document.getElementById('ePurchaseSource').value = e.purchaseSource || '';
        document.getElementById('ePurchaseDate').value = (e.purchaseDate || '').substring(0, 10);
        document.getElementById('ePrice').value = e.price || '';
        document.getElementById('eFundSource').value = e.fundSource || '';
        document.getElementById('eOwner').value = e.owner || '';
        document.getElementById('eSerial').value = e.serialNo || '';
        document.getElementById('eNotes').value = e.notes || '';
        var radio = document.querySelector('input[name="eStatus"][value="' + (e.status || 'normal') + '"]');
        if (radio) radio.checked = true;
        document.getElementById('deleteEquipBtn').style.display = 'inline-flex';
        if (e.imageUrl) {
          document.getElementById('eExistingImageUrl').value = e.imageUrl;
          showImagePreview(e.imageUrl);
        }
      }
    }
  }

  function closeEquipModal() {
    document.getElementById('equipModal').style.display = 'none';
    clearImagePreview();
  }

  /* ── Image upload ── */
  function onImageSelect(evt) {
    var file = evt.target.files && evt.target.files[0];
    if (!file) return;
    if (file.size > 5 * 1024 * 1024) { showToast('รูปต้องไม่เกิน 5 MB', 'error'); return; }
    pendingImageFile = file;
    var reader = new FileReader();
    reader.onload = function(e) { showImagePreview(e.target.result); };
    reader.readAsDataURL(file);
  }

  function onDragOver(e) {
    e.preventDefault();
    document.getElementById('uploadZone').classList.add('drag');
  }
  function onDragLeave() {
    document.getElementById('uploadZone').classList.remove('drag');
  }
  function onDrop(e) {
    e.preventDefault();
    document.getElementById('uploadZone').classList.remove('drag');
    var file = e.dataTransfer.files[0];
    if (!file || !file.type.startsWith('image/')) { showToast('กรุณาลากไฟล์รูปภาพเท่านั้น', 'error'); return; }
    pendingImageFile = file;
    var reader = new FileReader();
    reader.onload = function(ev) { showImagePreview(ev.target.result); };
    reader.readAsDataURL(file);
  }

  function showImagePreview(src) {
    document.getElementById('uploadPlaceholder').style.display = 'none';
    var img = document.getElementById('imgPreview');
    img.src = src;
    img.style.display = 'block';
    document.getElementById('imgRemoveBtn').style.display = 'flex';
  }

  function clearImagePreview() {
    pendingImageFile = null;
    document.getElementById('uploadPlaceholder').style.display = 'flex';
    document.getElementById('imgPreview').style.display = 'none';
    document.getElementById('imgPreview').src = '';
    document.getElementById('imgRemoveBtn').style.display = 'none';
    document.getElementById('eImageFile').value = '';
    document.getElementById('uploadZone').classList.remove('drag');
  }

  function removeImage(e) {
    e.stopPropagation();
    clearImagePreview();
    document.getElementById('eExistingImageUrl').value = '';
  }

  /* ── Save ── */
  document.getElementById('equipForm').addEventListener('submit', function(ev) {
    ev.preventDefault();
    var saveBtn = document.getElementById('saveEquipBtn');
    saveBtn.disabled = true;
    saveBtn.textContent = 'กำลังบันทึก...';

    var id = document.getElementById('equipId').value;
    var statusRadio = document.querySelector('input[name="eStatus"]:checked');
    var payload = {
      equipmentId:    id,
      name:           document.getElementById('eName').value.trim(),
      type:           document.getElementById('eType').value,
      purchaseSource: document.getElementById('ePurchaseSource').value.trim(),
      purchaseDate:   document.getElementById('ePurchaseDate').value,
      price:          document.getElementById('ePrice').value || 0,
      fundSource:     document.getElementById('eFundSource').value,
      owner:          document.getElementById('eOwner').value.trim(),
      serialNo:       document.getElementById('eSerial').value.trim(),
      status:         statusRadio ? statusRadio.value : 'normal',
      notes:          document.getElementById('eNotes').value.trim(),
      imageUrl:       document.getElementById('eExistingImageUrl').value,
    };

    function doSave(imgUrl) {
      if (imgUrl) payload.imageUrl = imgUrl;
      apiCall(id ? 'updateEquipment' : 'addEquipment', payload, function(r) {
        saveBtn.disabled = false;
        saveBtn.textContent = '💾 บันทึก';
        if (r && r.success) {
          showToast('บันทึกสำเร็จ', 'success');
          closeEquipModal();
          loadEquipment();
        } else {
          showToast((r && r.message) || 'เกิดข้อผิดพลาด', 'error');
        }
      });
    }

    if (pendingImageFile) {
      var tempId = id || ('tmp_' + Date.now());
      apiCall('uploadEquipmentImage', { file: pendingImageFile, equipmentId: tempId }, function(r) {
        if (r && r.success && r.imageUrl) {
          doSave(r.imageUrl);
        } else {
          saveBtn.disabled = false;
          saveBtn.textContent = '💾 บันทึก';
          showToast('อัพโหลดรูปไม่สำเร็จ: ' + ((r && r.message) || ''), 'error');
        }
      });
    } else {
      doSave(null);
    }
  });

  /* ── Delete ── */
  function deleteCurrentEquip() {
    var id = document.getElementById('equipId').value;
    showConfirm('ยืนยันการลบ', 'ต้องการลบอุปกรณ์นี้ออกจากระบบ?').then(function(ok) {
      if (!ok) return;
      apiCall('deleteEquipment', { equipmentId: id }, function(r) {
        if (r && r.success) {
          showToast('ลบแล้ว', 'success');
          closeEquipModal();
          loadEquipment();
        } else {
          showToast((r && r.message) || 'เกิดข้อผิดพลาด', 'error');
        }
      });
    });
  }
  </script>
</body>
</html>
