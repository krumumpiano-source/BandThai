<!DOCTYPE html>
<html lang="th">
<head>
  <meta charset="UTF-8">
  <meta name="google-adsense-account" content="ca-pub-6824376916256036">
  <script async src="https://pagead2.googlesyndication.com/pagead/js/adsbygoogle.js?client=ca-pub-6824376916256036" crossorigin="anonymous"></script>
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
  <link rel="manifest" href="manifest.json">
  <link rel="apple-touch-icon" sizes="180x180" href="icons/apple-touch-icon-180.png">
  <link rel="icon" type="image/png" sizes="32x32" href="icons/favicon-32.png">
  <meta name="mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="theme-color" content="#1a1a1a">
  <title>ตั้งรหัสผ่านใหม่ — BandThai</title>
  <link href="https://fonts.googleapis.com/css2?family=Kanit:wght@400;600;700&family=Sarabun:wght@400;500;600&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="css/theme.css">
  <link rel="stylesheet" href="css/compat.css">
  <style>
    body{display:flex;align-items:center;justify-content:center;min-height:100vh;padding:var(--spacing-md)}
    .auth-wrap{width:100%;max-width:420px}
    .auth-card{background:var(--premium-white);border-radius:var(--radius-xl);box-shadow:var(--shadow-2xl);padding:var(--spacing-2xl)}
    .auth-logo{text-align:center;margin-bottom:var(--spacing-xl)}
    .auth-logo h1{font-family:var(--font-family-display);font-size:var(--text-2xl);font-weight:700;color:var(--premium-gold)}
    .btn-full{width:100%;justify-content:center;padding:12px;font-size:var(--text-base);margin-top:var(--spacing-sm)}
    .info-box{border-radius:var(--radius-md);padding:var(--spacing-md);font-size:var(--text-sm);margin-bottom:var(--spacing-lg)}
    .info-box.success{background:#f0fff4;border:1px solid #c6f6d5;color:#276749}
    .info-box.error{background:#fff5f5;border:1px solid #fed7d7;color:#c53030}
    .info-box.loading{background:#ebf8ff;border:1px solid #bee3f8;color:#2b6cb0}
    .auth-footer{text-align:center;margin-top:var(--spacing-lg);font-size:var(--text-sm);color:var(--premium-text-light)}
    .auth-footer a{color:var(--premium-gold);font-weight:600;text-decoration:none}
    .pw-rules{font-size:var(--text-xs);color:var(--premium-text-light);margin-top:4px}
  </style>
</head>
<body>
  <div id="toast"></div>
  <div class="auth-wrap">
    <div class="auth-card">
      <div class="auth-logo">
        <h1>🔐</h1>
        <h2 style="color:var(--premium-text);font-size:var(--text-xl)">ตั้งรหัสผ่านใหม่</h2>
        <p style="color:var(--premium-text-light);font-size:var(--text-sm)">กรอกรหัสผ่านใหม่ที่ต้องการใช้</p>
      </div>

      <!-- Loading state -->
      <div class="info-box loading" id="loadingBox">กำลังตรวจสอบลิงก์...</div>

      <!-- Error state -->
      <div class="info-box error" id="errorBox" style="display:none"></div>

      <!-- Success state -->
      <div class="info-box success" id="successBox" style="display:none">
        ✅ เปลี่ยนรหัสผ่านเรียบร้อยแล้ว! กำลังไปหน้าเข้าสู่ระบบ...
      </div>

      <!-- Password form -->
      <form id="resetForm" style="display:none">
        <div class="form-group">
          <label>รหัสผ่านใหม่</label>
          <input type="password" id="newPassword" placeholder="อย่างน้อย 6 ตัวอักษร" required minlength="6">
          <div class="pw-rules">ต้องมีอย่างน้อย 6 ตัวอักษร</div>
        </div>
        <div class="form-group">
          <label>ยืนยันรหัสผ่านใหม่</label>
          <input type="password" id="confirmPassword" placeholder="กรอกรหัสผ่านอีกครั้ง" required minlength="6">
        </div>
        <button type="submit" class="btn btn-primary btn-full" id="resetBtn">
          ✅ ตั้งรหัสผ่านใหม่
        </button>
      </form>

      <div class="auth-footer">
        <a href="index.html">← กลับไปเข้าสู่ระบบ</a>
      </div>
    </div>
  </div>

  <script src="js/i18n.js"></script>
  <script src="js/app.js"></script>
  <script>
  document.addEventListener('DOMContentLoaded', function() {
    var loadingBox = document.getElementById('loadingBox');
    var errorBox   = document.getElementById('errorBox');
    var successBox = document.getElementById('successBox');
    var resetForm  = document.getElementById('resetForm');

    function showError(msg) {
      loadingBox.style.display = 'none';
      resetForm.style.display  = 'none';
      successBox.style.display = 'none';
      errorBox.textContent = msg;
      errorBox.style.display = 'block';
    }

    function showForm() {
      loadingBox.style.display = 'none';
      errorBox.style.display   = 'none';
      resetForm.style.display  = 'block';
    }

    function showSuccess() {
      loadingBox.style.display = 'none';
      errorBox.style.display   = 'none';
      resetForm.style.display  = 'none';
      successBox.style.display = 'block';
      setTimeout(function() { window.location.href = 'index.html'; }, 2500);
    }

    // รอ Supabase SDK โหลดเสร็จ แล้วตรวจสอบ session
    function waitAndCheck() {
      if (typeof apiCall === 'undefined') {
        setTimeout(waitAndCheck, 200);
        return;
      }

      // Supabase จะ auto-detect recovery token จาก URL hash
      // และสร้าง session ให้อัตโนมัติผ่าน onAuthStateChange
      // รอ session สักครู่
      var attempts = 0;
      var maxAttempts = 25; // 5 วินาที

      function checkSession() {
        attempts++;
        // ตรวจว่ามี auth session จาก recovery link
        if (typeof sb !== 'undefined' && sb.auth) {
          sb.auth.getSession().then(function(res) {
            if (res.data && res.data.session) {
              showForm();
            } else if (attempts < maxAttempts) {
              setTimeout(checkSession, 200);
            } else {
              showError('ลิงก์รีเซ็ตหมดอายุหรือไม่ถูกต้อง กรุณาขอลิงก์ใหม่');
            }
          });
        } else if (attempts < maxAttempts) {
          setTimeout(checkSession, 200);
        } else {
          showError('ไม่สามารถเชื่อมต่อระบบได้ กรุณาลองใหม่');
        }
      }

      checkSession();
    }

    waitAndCheck();

    // Handle form submit
    resetForm.addEventListener('submit', function(e) {
      e.preventDefault();
      var pw  = document.getElementById('newPassword').value;
      var pw2 = document.getElementById('confirmPassword').value;

      if (pw.length < 6) {
        if (typeof showToast === 'function') showToast('รหัสผ่านต้องมีอย่างน้อย 6 ตัวอักษร', 'error');
        return;
      }
      if (pw !== pw2) {
        if (typeof showToast === 'function') showToast('รหัสผ่านไม่ตรงกัน', 'error');
        return;
      }

      var btn = document.getElementById('resetBtn');
      btn.disabled = true;
      btn.textContent = 'กำลังบันทึก...';

      apiCall('resetPassword', { newPassword: pw }, function(r) {
        if (r && r.success) {
          showSuccess();
        } else {
          btn.disabled = false;
          btn.textContent = '✅ ตั้งรหัสผ่านใหม่';
          if (typeof showToast === 'function') showToast((r && r.message) || 'เกิดข้อผิดพลาด', 'error');
        }
      });
    });
  });
  </script>
</body>
</html>
