<!DOCTYPE html>
<html lang="th">
<head>
  <meta charset="UTF-8">
  <meta name="google-adsense-account" content="ca-pub-6824376916256036">
  <script async src="https://pagead2.googlesyndication.com/pagead/js/adsbygoogle.js?client=ca-pub-6824376916256036" crossorigin="anonymous"></script>
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
  <link rel="manifest" href="manifest.json">
  <link rel="apple-touch-icon" sizes="180x180" href="icons/apple-touch-icon-180.png">
  <link rel="icon" type="image/png" sizes="32x32" href="icons/favicon-32.png">
  <meta name="mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="theme-color" content="#0d0d1a">
  <title>BandThai</title>
  <link href="https://fonts.googleapis.com/css2?family=Kanit:wght@300;400;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="css/theme.css">
  <link rel="stylesheet" href="css/compat.css">
  <style>
    *,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
    html,body{height:100%}
    body{
      min-height:100dvh;
      background:#0a0a15;
      font-family:'Kanit',sans-serif;
      color:#f0f0f0;
      display:flex;flex-direction:column;
      align-items:center;justify-content:center;
      overflow:hidden;
    }
    body::before{
      content:'';position:fixed;inset:0;
      background:radial-gradient(ellipse 80% 60% at 50% -10%,rgba(212,168,67,.18) 0%,transparent 70%),
                 radial-gradient(ellipse 60% 40% at 80% 110%,rgba(99,102,241,.12) 0%,transparent 60%);
      pointer-events:none;z-index:0;
    }
    #toast{
      position:fixed;top:calc(16px + env(safe-area-inset-top,0));left:50%;
      transform:translateX(-50%);
      background:rgba(255,255,255,.15);backdrop-filter:blur(12px);
      color:#fff;padding:10px 24px;border-radius:24px;
      font-size:.82rem;opacity:0;pointer-events:none;z-index:999;
      transition:opacity .25s;white-space:nowrap;max-width:88vw;text-align:center;
      border:1px solid rgba(255,255,255,.12);
    }
    #toast.show{opacity:1}
    #loginWrap{
      position:relative;z-index:1;
      width:100%;max-width:420px;
      padding:calc(env(safe-area-inset-top,0) + 16px) 16px calc(env(safe-area-inset-bottom,0) + 16px);
    }
    .auth-card{
      background:rgba(255,255,255,.97);
      border-radius:24px;
      box-shadow:0 24px 64px rgba(0,0,0,.5);
      padding:36px 28px 28px;
    }
    .auth-logo{text-align:center;margin-bottom:24px}
    .auth-logo h1{
      font-size:1.25rem;font-weight:700;color:#b8862a;
      display:flex;align-items:center;justify-content:center;gap:6px;
    }
    .auth-logo p{color:#aaa;font-size:.78rem;margin-top:4px}
    .form-group{margin-bottom:14px}
    .form-group label{display:block;font-size:.8rem;font-weight:600;color:#555;margin-bottom:6px}
    .form-group input{
      width:100%;border:1.5px solid #e5e7eb;border-radius:12px;
      padding:12px 14px;font-size:.97rem;font-family:inherit;
      background:#f9fafb;color:#111;outline:none;
      transition:border-color .2s,box-shadow .2s;
    }
    .form-group input:focus{border-color:#d4a843;background:#fff;box-shadow:0 0 0 3px rgba(212,168,67,.15)}
    .err-msg{color:#dc2626;font-size:.73rem;margin-top:4px;min-height:16px}
    .pw-wrap{position:relative;display:flex;align-items:center}
    .pw-wrap input{flex:1;padding-right:44px}
    .btn-toggle-pw{
      position:absolute;right:12px;background:none;border:none;
      cursor:pointer;font-size:16px;opacity:.45;padding:0;transition:opacity .2s;
    }
    .btn-toggle-pw:hover{opacity:.85}
    .forgot-link{float:right;font-size:.73rem;color:#bbb;text-decoration:none}
    .forgot-link:hover{color:#d4a843}
    .btn-signin{
      width:100%;padding:14px;border:none;border-radius:14px;
      background:linear-gradient(135deg,#d4a843 0%,#a06a00 100%);
      color:#fff;font-size:1rem;font-weight:700;
      font-family:inherit;cursor:pointer;margin-top:8px;
      transition:transform .12s,box-shadow .15s,opacity .15s;
      box-shadow:0 6px 20px rgba(212,168,67,.38);letter-spacing:.2px;
    }
    .btn-signin:hover{transform:translateY(-1px);box-shadow:0 8px 26px rgba(212,168,67,.48)}
    .btn-signin:active{transform:scale(.97)}
    .btn-signin:disabled{opacity:.5;cursor:not-allowed;transform:none}
    .auth-footer{text-align:center;margin-top:18px;font-size:.77rem;color:#aaa;line-height:1.8}
    .auth-footer a{color:#d4a843;font-weight:600;text-decoration:none}
    .auth-footer a:hover{text-decoration:underline}
    #inappBanner{
      position:fixed;top:0;left:0;right:0;z-index:900;
      background:linear-gradient(135deg,#92400e,#78350f);
      color:#fef3c7;font-size:.82rem;text-align:center;
      padding:calc(env(safe-area-inset-top,0) + 12px) 16px 12px;
      line-height:1.55;display:none;border-bottom:1px solid rgba(255,200,0,.25);
      box-shadow:0 4px 20px rgba(0,0,0,.4);
    }
    #inappBanner.show{display:block}
    #inappBanner b{color:#fde68a}
    #inappBanner a{
      display:inline-block;margin-top:8px;padding:6px 16px;
      background:#d4a843;color:#000;border-radius:20px;
      font-weight:700;font-size:.78rem;text-decoration:none;
    }
  </style>
</head>
<body>
  <div id="inappBanner">
    &#9888;&#65039; กำลังเปิดใน <b id="inappAppName">Browser ของแอป</b><br>
    กรุณาเปิดใน <b>Safari</b> หรือ <b>Chrome</b> เพื่อใช้งานได้เต็มรูปแบบ<br>
    <a id="inappOpenLink" href="#">เปิดใน Browser &#8594;</a>
  </div>
  <div id="toast"></div>
  <div id="loginWrap">
    <div class="auth-card">
      <div class="auth-logo">
        <h1>&#9835; BandThai</h1>
        <p>ระบบจัดการวงดนตรี</p>
      </div>
      <form id="loginForm" autocomplete="on">
        <div class="form-group">
          <label for="email">อีเมล</label>
          <input type="email" id="email" name="email" autocomplete="username email" placeholder="your@email.com" required>
          <div class="err-msg" id="emailError"></div>
        </div>
        <div class="form-group">
          <label for="password">
            รหัสผ่าน
            <a href="forgot-password.html" class="forgot-link">ลืมรหัสผ่าน?</a>
          </label>
          <div class="pw-wrap">
            <input type="password" id="password" name="password" autocomplete="current-password" placeholder="&#8226;&#8226;&#8226;&#8226;&#8226;&#8226;&#8226;&#8226;" required>
            <button type="button" class="btn-toggle-pw" id="togglePassword" tabindex="-1">&#128065;</button>
          </div>
          <div class="err-msg" id="passwordError"></div>
        </div>
        <button type="submit" class="btn-signin" id="loginBtn">เข้าสู่ระบบ</button>
      </form>
      <div class="auth-footer">
        ยังไม่มีบัญชี? <a href="register.html">สมัครสมาชิก</a>
        &nbsp;|&nbsp;<a href="create-band.html">ขอสร้างวงใหม่</a><br>
        <a href="forgot-password.html">ลืมรหัสผ่าน?</a>
        &nbsp;|&nbsp;<a href="forgot-email.html">ลืมอีเมล?</a>
        &nbsp;|&nbsp;<a href="terms.html">ข้อกำหนด</a>
        &nbsp;|&nbsp;<a href="user-manual.html">📖 คู่มือใช้งาน</a>
      </div>
    </div>
  </div>
  <script src="js/i18n.js"></script>
  <script src="js/app.js"></script>
  <script>
  var UA = navigator.userAgent;
  var IS_IOS    = /iPhone|iPad|iPod/.test(UA);
  var IS_FB     = /FBAN|FBAV/.test(UA);
  var IS_IG     = /Instagram/.test(UA);
  var IS_LINE   = /Line\//.test(UA);
  var IS_WECHAT = /MicroMessenger/.test(UA);
  var IS_TIKTOK = /musical_ly|TikTok/.test(UA);
  var IS_INAPP  = IS_FB || IS_IG || IS_LINE || IS_WECHAT || IS_TIKTOK ||
                  (IS_IOS && /Safari/.test(UA) === false && /AppleWebKit/.test(UA));
  function getInAppName(){
    if(IS_FB) return 'Facebook'; if(IS_IG) return 'Instagram';
    if(IS_LINE) return 'LINE'; if(IS_WECHAT) return 'WeChat';
    if(IS_TIKTOK) return 'TikTok'; return 'แอปนี้';
  }
  function showToast(msg, dur){
    var t = document.getElementById('toast');
    t.textContent = msg; t.classList.add('show');
    clearTimeout(t._t); t._t = setTimeout(function(){ t.classList.remove('show'); }, dur || 2400);
  }
  function clearErrors(){
    ['emailError','passwordError'].forEach(function(id){
      var e = document.getElementById(id); if(e) e.textContent = '';
    });
  }
  document.addEventListener('DOMContentLoaded', function(){
    if(IS_INAPP){
      var banner = document.getElementById('inappBanner');
      document.getElementById('inappAppName').textContent = getInAppName();
      var link = document.getElementById('inappOpenLink');
      var pageUrl = location.href;
      if(IS_LINE){
        link.href = pageUrl + (pageUrl.indexOf('?') >= 0 ? '&' : '?') + 'openExternalBrowser=1';
      } else {
        link.href = pageUrl;
        link.addEventListener('click', function(e){
          e.preventDefault();
          var intent = 'intent://' + pageUrl.replace(/^https?:\/\//, '') +
                       '#Intent;scheme=https;package=com.android.chrome;end';
          window.location = IS_IOS ? pageUrl : intent;
          setTimeout(function(){ window.location = pageUrl; }, 800);
        });
      }
      banner.classList.add('show');
    }
    document.getElementById('togglePassword').addEventListener('click', function(){
      var pw = document.getElementById('password');
      if(pw.type === 'password'){ pw.type = 'text'; this.innerHTML = '&#128584;'; }
      else { pw.type = 'password'; this.innerHTML = '&#128065;'; }
    });
    document.getElementById('loginForm').addEventListener('submit', function(e){
      e.preventDefault();
      clearErrors();
      var email    = document.getElementById('email').value.trim();
      var password = document.getElementById('password').value;
      if(!/^[^\s@]+@[^\s@]+\.[^\s@]+$/.test(email)){
        document.getElementById('emailError').textContent = 'อีเมลไม่ถูกต้อง'; return;
      }
      if(!password){
        document.getElementById('passwordError').textContent = 'กรุณากรอกรหัสผ่าน'; return;
      }
      var btn = document.getElementById('loginBtn');
      btn.disabled = true; btn.textContent = 'กำลังเข้าสู่ระบบ...';
      apiCall('login', { email: email, password: password }, function(r){
        btn.disabled = false; btn.textContent = 'เข้าสู่ระบบ';
        if(r && r.success){
          localStorage.setItem('auth_token', r.token);
          localStorage.setItem('userName',   r.userName || '');
          localStorage.setItem('userEmail',  email);
          localStorage.setItem('bandName',   r.bandName || '');
          localStorage.setItem('bandId',     r.bandId   || '');
          localStorage.setItem('userRole',   r.role     || 'member');
          if(r.role === 'manager' || r.role === 'admin')
            localStorage.setItem('bandManager', '1');
          else
            localStorage.removeItem('bandManager');
          window.location.href = 'dashboard.html';
        } else {
          document.getElementById('emailError').textContent =
            (r && r.message) || 'อีเมลหรือรหัสผ่านไม่ถูกต้อง';
        }
      });
    });
  });
  </script>
</body>
</html>
