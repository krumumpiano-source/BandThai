<!DOCTYPE html>
<html lang="th">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <link rel="manifest" href="manifest.json">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="theme-color" content="#1a1a1a">
  <title>Band Management By SoulCiety — เข้าสู่ระบบ</title>
  <link href="https://fonts.googleapis.com/css2?family=Kanit:wght@400;600;700&family=Sarabun:wght@400;500;600&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="css/theme.css">
  <link rel="stylesheet" href="css/compat.css">
  <style>
    body{display:flex;align-items:center;justify-content:center;min-height:100vh;padding:var(--spacing-md)}
    .auth-wrap{width:100%;max-width:420px}
    .auth-card{background:var(--premium-white);border-radius:var(--radius-xl);box-shadow:var(--shadow-2xl);padding:var(--spacing-2xl)}
    .auth-logo{text-align:center;margin-bottom:var(--spacing-xl)}
    .auth-logo h1{font-family:var(--font-family-display);font-size:var(--text-2xl);font-weight:700;color:var(--premium-gold)}
    .auth-logo p{color:var(--premium-text-light);font-size:var(--text-sm);margin-top:4px}
    .lang-top{position:fixed;top:16px;right:16px}
    .btn-full{width:100%;justify-content:center;padding:12px;font-size:var(--text-base);margin-top:var(--spacing-sm)}
    .btn-demo{background:#276749}
    .btn-demo:hover{background:#1c4532}
    .err-msg{color:#c53030;font-size:var(--text-xs);margin-top:4px;min-height:18px}
    .divider{text-align:center;color:var(--premium-text-muted);font-size:var(--text-sm);margin:var(--spacing-md) 0;position:relative}
    .divider::before,.divider::after{content:'';position:absolute;top:50%;width:42%;height:1px;background:var(--premium-light-gray)}
    .divider::before{left:0} .divider::after{right:0}
    .auth-footer{text-align:center;margin-top:var(--spacing-lg);font-size:var(--text-sm);color:var(--premium-text-light)}
    .auth-footer a{color:var(--premium-gold);font-weight:600;text-decoration:none}
    .auth-footer a:hover{text-decoration:underline}
    .forgot-link{float:right;font-size:var(--text-xs);color:var(--premium-text-light);text-decoration:none}
    .forgot-link:hover{color:var(--premium-gold)}
    /* Biometric button */
    .btn-biometric{width:100%;justify-content:center;padding:13px;font-size:var(--text-base);
      background:linear-gradient(135deg,#2b2d42,#3a3f58);color:#fff;border:none;border-radius:var(--radius-lg);
      cursor:pointer;font-family:var(--font-family-body);font-weight:600;letter-spacing:.3px;
      display:flex;align-items:center;gap:10px;margin-top:var(--spacing-sm);
      box-shadow:0 2px 10px rgba(43,45,66,.25);transition:transform .15s,box-shadow .15s}
    .btn-biometric:hover{transform:translateY(-1px);box-shadow:0 4px 16px rgba(43,45,66,.35)}
    .btn-biometric:active{transform:translateY(0)}
    .btn-biometric .bio-icon{font-size:22px;line-height:1}
    .bio-hint{text-align:center;font-size:11px;color:var(--premium-text-muted);margin-top:5px}
    .btn-biometric:disabled{opacity:.5;cursor:not-allowed;transform:none}
    .pw-wrap{position:relative;display:flex;align-items:center}
    .pw-wrap input{flex:1;padding-right:42px}
    .btn-toggle-pw{position:absolute;right:10px;background:none;border:none;cursor:pointer;padding:0;color:var(--premium-text-light);font-size:18px;line-height:1;display:flex;align-items:center;opacity:.7;transition:opacity .2s}
    .btn-toggle-pw:hover{opacity:1}
  </style>
</head>
<body>
  <div class="lang-top"><div id="langToggle"></div></div>
  <div id="toast"></div>
  <div class="auth-wrap">
    <div class="auth-card">
      <div class="auth-logo">
        <h1>🎵 Band Management</h1>
        <p data-i18n="appCredit">Band Management By SoulCiety</p>
      </div>
      <form id="loginForm">
        <div class="form-group">
          <label for="email" data-i18n="email">อีเมล</label>
          <input type="email" id="email" autocomplete="email" data-i18n-placeholder="enterEmail" placeholder="กรุณากรอกอีเมล" required>
          <div class="err-msg" id="emailError"></div>
        </div>
        <div class="form-group">
          <label for="password">
            <span data-i18n="password">รหัสผ่าน</span>
            <a href="forgot-password.html" class="forgot-link" data-i18n="forgotPassword">ลืมรหัสผ่าน?</a>
          </label>
          <div class="pw-wrap">
            <input type="password" id="password" autocomplete="current-password" data-i18n-placeholder="enterPassword" placeholder="กรุณากรอกรหัสผ่าน" required>
            <button type="button" class="btn-toggle-pw" id="togglePassword" aria-label="แสดง/ซ่อนรหัสผ่าน">👁</button>
          </div>
          <div class="err-msg" id="passwordError"></div>
        </div>
        <button type="submit" class="btn btn-primary btn-full" id="loginBtn">
          <span data-i18n="login">เข้าสู่ระบบ</span>
        </button>
      </form>
      <!-- Biometric / Saved-credential button (hidden until supported) -->
      <div id="biometricSection" style="display:none;margin-top:var(--spacing-md)">
        <div class="divider">หรือ</div>
        <button type="button" class="btn-biometric" id="biometricBtn">
          <span class="bio-icon" id="biometricIcon">👆</span>
          <span id="biometricLabel">เข้าสู่ระบบด้วยลายนิ้วมือ / Face ID</span>
        </button>
        <div class="bio-hint" id="biometricHint">ใช้ชีวมิติของอุปกรณ์เพื่อเข้าระบบโดยไม่ต้องพิมพ์รหัสผ่าน</div>
      </div>

      <div class="auth-footer">
        <span data-i18n="noAccount">ยังไม่มีบัญชี?</span>
        <a href="register.html" data-i18n="registerNew">สมัครสมาชิก</a>
        &nbsp;|&nbsp;
        <a href="create-band.html">ขอสร้างวงใหม่</a>
        <br>
        <a href="forgot-password.html" style="font-size:var(--text-xs)">ลืมรหัสผ่าน?</a>
        &nbsp;|&nbsp;
        <a href="forgot-email.html" style="font-size:var(--text-xs)">ลืมอีเมล?</a>
        &nbsp;|&nbsp;
        <a href="terms.html" data-i18n="terms_link" style="font-size:var(--text-xs)">ข้อกำหนดการใช้งาน</a>
      </div>
    </div>
  </div>

  <script src="js/i18n.js"></script>
  <script src="js/app.js"></script>
  <script>
  /* ===== Biometric / Credential Management Helper ===== */
  var CRED_API = !!(window.PasswordCredential || window.FederatedCredential);
  // iOS Safari handles biometric via autocomplete="current-password" natively —
  // We still show the button on iOS for UX, powered by the credential store.

  function bioDetectIcon() {
    var ua = navigator.userAgent;
    if (/iPhone|iPad/.test(ua)) return '🔒'; // FaceID / TouchID
    if (/Android/.test(ua)) return '👆';      // Fingerprint
    return '🔑';                               // Desktop - system keychain
  }

  function doLoginSuccess(r, email, password, userName) {
    // 1. Store in localStorage (existing logic)
    localStorage.setItem('auth_token', r.token);
    localStorage.setItem('userName', userName || r.userName || '');
    localStorage.setItem('userEmail', email);
    localStorage.setItem('bandName', r.bandName || '');
    localStorage.setItem('bandId', r.bandId || '');
    localStorage.setItem('userRole', r.role || 'member');
    if (r.role === 'manager' || r.role === 'admin') localStorage.setItem('bandManager', '1');
    else localStorage.removeItem('bandManager');

    // 2. Save credentials for biometric / password-manager (async, fire-and-forget)
    if (CRED_API && password) {
      try {
        var cred = new PasswordCredential({
          id: email,
          password: password,
          name: userName || r.userName || email
        });
        navigator.credentials.store(cred).catch(function(){});
      } catch(ex) {}
    }

    // 3. Navigate
    window.location.href = 'dashboard.html';
  }

  document.addEventListener('DOMContentLoaded', function() {
    if (typeof renderLangToggle === 'function') renderLangToggle('langToggle');
    if (typeof applyTranslations === 'function') applyTranslations();

    var loginForm   = document.getElementById('loginForm');
    var togglePassword = document.getElementById('togglePassword');
    if (togglePassword) {
      togglePassword.addEventListener('click', function() {
        var pw = document.getElementById('password');
        if (pw.type === 'password') { pw.type = 'text'; togglePassword.textContent = '🙈'; }
        else { pw.type = 'password'; togglePassword.textContent = '👁'; }
      });
    }
    var bioSection  = document.getElementById('biometricSection');
    var bioBtn      = document.getElementById('biometricBtn');
    var bioIcon     = document.getElementById('biometricIcon');
    var bioLabel    = document.getElementById('biometricLabel');
    var bioHint     = document.getElementById('biometricHint');

    // ----- Detect & show biometric button -----
    // Show on supported browsers (Credential Management API present)
    if (CRED_API || /iPhone|iPad/.test(navigator.userAgent)) {
      bioSection.style.display = 'block';
      bioIcon.textContent = bioDetectIcon();

      // On iOS/iPad — uses native Safari behaviour; label change only
      if (/iPhone|iPad/.test(navigator.userAgent)) {
        bioLabel.textContent = 'เข้าสู่ระบบด้วย Face ID / Touch ID';
        bioHint.textContent = 'Safari จะใช้ Face ID หรือ Touch ID จากรหัสผ่านที่บันทึกไว้';
      }

      // Auto-fetch saved credentials on load (silent, mediation: optional)
      if (CRED_API) {
        navigator.credentials.get({ password: true, mediation: 'optional' }).then(function(cred) {
          if (cred && cred.type === 'password' && cred.id && cred.password) {
            // Pre-fill fields quietly — user can still tap biometric button to confirm
            document.getElementById('email').value    = cred.id;
            document.getElementById('password').value = cred.password;
            // Show a hint that credentials are prefilled
            bioHint.textContent = '🔓 พบบัญชีที่บันทึกไว้สำหรับ ' + cred.id + ' — กดปุ่มด้านบนเพื่อยืนยัน';
          }
        }).catch(function(){});
      }
    }

    // ----- Biometric button click -----
    if (bioBtn) {
      bioBtn.addEventListener('click', function() {
        if (!CRED_API) {
          // iOS Safari: just focus the password field so the OS shows its saved-password prompt
          document.getElementById('password').focus();
          return;
        }
        bioBtn.disabled = true;
        bioLabel.textContent = '⏳ กำลังยืนยันตัวตน...';

        navigator.credentials.get({ password: true, mediation: 'required' })
          .then(function(cred) {
            bioBtn.disabled = false;
            bioLabel.textContent = 'เข้าสู่ระบบด้วยลายนิ้วมือ / Face ID';
            if (!cred || cred.type !== 'password') return;

            // Fill fields visually (for transparency)
            document.getElementById('email').value    = cred.id;
            document.getElementById('password').value = cred.password;

            // Auto-submit
            var btn = document.getElementById('loginBtn');
            btn.disabled = true; btn.textContent = (typeof t === 'function' ? t('loading') : 'กำลังโหลด...');
            clearErrors();

            apiCall('login', { email: cred.id, password: cred.password }, function(r) {
              btn.disabled = false; btn.textContent = (typeof t === 'function' ? t('login') : 'เข้าสู่ระบบ');
              if (r && r.success) {
                doLoginSuccess(r, cred.id, cred.password, cred.name);
              } else {
                document.getElementById('emailError').textContent = (r && r.message) || 'เข้าสู่ระบบไม่สำเร็จ';
              }
            });
          })
          .catch(function(err) {
            bioBtn.disabled = false;
            bioLabel.textContent = 'เข้าสู่ระบบด้วยลายนิ้วมือ / Face ID';
            // User cancelled → just let them type manually
            if (err && err.name !== 'NotAllowedError') {
              console.warn('Credential get error:', err);
            }
          });
      });
    }

    // ----- Normal form submit -----
    function clearErrors() {
      ['emailError','passwordError'].forEach(function(id) {
        var el = document.getElementById(id); if (el) el.textContent = '';
      });
    }

    loginForm.addEventListener('submit', function(e) {
      e.preventDefault();
      clearErrors();
      var email    = document.getElementById('email').value.trim();
      var password = document.getElementById('password').value;
      if (!/^[^\s@]+@[^\s@]+\.[^\s@]+$/.test(email)) {
        document.getElementById('emailError').textContent = (typeof t === 'function' ? t('errInvalidEmail') : 'อีเมลไม่ถูกต้อง'); return;
      }
      if (!password) {
        document.getElementById('passwordError').textContent = (typeof t === 'function' ? t('errEnterPassword') : 'กรุณากรอกรหัสผ่าน'); return;
      }
      var btn = document.getElementById('loginBtn');
      btn.disabled = true; btn.textContent = (typeof t === 'function' ? t('loading') : 'กำลังโหลด...');

      apiCall('login', { email: email, password: password }, function(r) {
        btn.disabled = false; btn.textContent = (typeof t === 'function' ? t('login') : 'เข้าสู่ระบบ');
        if (r && r.success) {
          doLoginSuccess(r, email, password, r.userName);
        } else {
          document.getElementById('emailError').textContent = (r && r.message) || (typeof t === 'function' ? t('msg_error') : 'เกิดข้อผิดพลาด');
        }
      });
    });

  });
  </script>
</body>
</html>
