<!DOCTYPE html>
<html lang="th">
<head>
  <meta charset="UTF-8">
  <meta name="google-adsense-account" content="ca-pub-6824376916256036">
  <script async src="https://pagead2.googlesyndication.com/pagead/js/adsbygoogle.js?client=ca-pub-6824376916256036" crossorigin="anonymous"></script>
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <link rel="manifest" href="manifest.json">
  <link rel="apple-touch-icon" sizes="180x180" href="icons/apple-touch-icon-180.png">
  <link rel="icon" type="image/png" sizes="32x32" href="icons/favicon-32.png">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="theme-color" content="#1a1a1a">
  <title>เพิ่มเพลง — BandThai</title>
  <link href="https://fonts.googleapis.com/css2?family=Kanit:wght@400;600;700&family=Sarabun:wght@400;500;600&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="css/theme.css">
  <link rel="stylesheet" href="css/nav.css">
  <link rel="stylesheet" href="css/compat.css">
  <style>
    .form-r{display:grid;grid-template-columns:1fr 1fr;gap:var(--spacing-md)}
    @media(max-width:480px){.form-r{grid-template-columns:1fr}}
    /* Singer pill buttons */
    .singer-pills{display:flex;gap:8px;flex-wrap:wrap;margin-top:4px}
    .singer-pill{position:relative}
    .singer-pill input[type=radio]{position:absolute;opacity:0;width:0;height:0;pointer-events:none}
    .singer-pill label{
      display:flex;align-items:center;gap:6px;padding:8px 18px;
      border:2px solid #e2e8f0;border-radius:999px;cursor:pointer;
      font-size:14px;font-weight:600;font-family:inherit;
      background:var(--premium-off-white,#f9f9f9);color:var(--premium-text,#333);
      transition:all .15s;user-select:none;line-height:1
    }
    .singer-pill label:hover{border-color:var(--premium-gold);color:var(--premium-gold)}
    /* ชาย = blue */
    #s-male:checked + label{
      background:#dbeafe;color:#1e3a8a;
      border-color:#93c5fd;
      box-shadow:0 2px 8px rgba(59,130,246,.25)
    }
    /* หญิง = pink */
    #s-female:checked + label{
      background:#fce7f3;color:#9d174d;
      border-color:#f9a8d4;
      box-shadow:0 2px 8px rgba(236,72,153,.25)
    }
    /* คู่ = green */
    #s-duet:checked + label{
      background:#d1fae5;color:#065f46;
      border-color:#6ee7b7;
      box-shadow:0 2px 8px rgba(16,185,129,.25)
    }
  </style>
</head>
<body>
  <div id="mainNav"></div>
  <div id="toast"></div>
  <main>
    <div class="container" style="max-width:640px">
      <div class="page-header">
        <h1 class="page-title">เพิ่มเพลง</h1>
        <a href="songs.html" class="btn btn-ghost">← กลับ</a>
      </div>
      <!-- Banner: shortcut to select-mode in global library -->
      <div id="selectModeBanner" style="display:none;background:rgba(99,102,241,.10);border:1.5px solid rgba(99,102,241,.35);border-radius:14px;padding:12px 16px;margin-bottom:16px;display:flex;align-items:center;gap:12px">
        <span style="font-size:1.5rem;flex-shrink:0">💡</span>
        <div style="flex:1;min-width:0">
          <strong style="font-size:.95rem">เพิ่มจากคลังกลางได้ง่ายกว่า!</strong>
          <p style="margin:3px 0 0;font-size:.82rem;color:rgba(165,180,252,.85)">เลือกได้หลายเพลงพร้อมกัน ไม่ต้องกรอกทีละเพลง</p>
        </div>
        <a href="songs.html?selectMode=1" style="flex-shrink:0;background:linear-gradient(135deg,#6366f1,#4f46e5);color:#fff;text-decoration:none;border-radius:20px;padding:7px 14px;font-size:.85rem;font-weight:700;white-space:nowrap">🎵 เลือกจากคลัง</a>
      </div>
      <div class="card">
        <form id="addSongForm">
          <div class="form-group"><label>ชื่อเพลง *</label><input type="text" id="songName" required placeholder="ชื่อเพลง"></div>
          <div class="form-group"><label>ศิลปิน / วงดนตรีต้นฉบับ</label><input type="text" id="artist" list="artistDatalist" placeholder="พิมพ์ชื่อศิลปิน"></div>
          <datalist id="artistDatalist"></datalist>
          <div class="form-r">
            <div class="form-group">
              <label>คีย์</label>
              <select id="key"><option value="">—</option><option value="C">C / Am</option><optgroup label="# Sharp"><option>1#</option><option>2#</option><option>3#</option><option>4#</option><option>5#</option><option>6#</option><option>7#</option></optgroup><optgroup label="b Flat"><option>1b</option><option>2b</option><option>3b</option><option>4b</option><option>5b</option><option>6b</option><option>7b</option></optgroup></select>
            </div>
            <div class="form-group"><label>ความเร็ว (BPM)</label><input type="number" id="bpm" min="0" max="300" placeholder="0"></div>
          </div>
          <div class="form-r">
            <div class="form-group"><label>ยุคของเพลง</label><select id="era"><option value="">— เลือกยุค —</option><option value="80s">2523-2532 (80s)</option><option value="90s">2533-2542 (90s)</option><option value="2000s">2543-2553 (00s)</option><option value="2010s">2554-2562 (10s)</option><option value="2020s">2563-ปัจจุบัน (20s)</option></select></div>
            <div class="form-group">
              <label>อารมณ์เพลง</label>
              <select id="mood" onchange="updateMoodHint('mood','moodHint')"><option value="">— เลือกอารมณ์ —</option><option value="มัน / สนุก">มัน / สนุก</option><option value="หวาน / โรแมนติก">หวาน / โรแมนติก</option><option value="เศร้า / อกหัก">เศร้า / อกหัก</option><option value="นิ่ง / ผ่อนคลาย">นิ่ง / ผ่อนคลาย</option><option value="ฮึกเหิม / ยิ่งใหญ่">ฮึกเหิม / ยิ่งใหญ่</option></select>
              <small id="moodHint" style="display:block;margin-top:6px;color:var(--premium-text-muted,#888);font-size:12px;min-height:18px"></small>
            </div>
          </div>
          <div class="form-group"><label>แนวเพลง (ประเภท)</label><select id="genre"><option value="">— เลือกแนวเพลง —</option><option value="ป๊อป">ป๊อป</option><option value="ร็อค">ร็อค</option><option value="ดิสโก้">ดิสโก้</option><option value="ฮิปฮอป">ฮิปฮอป</option><option value="ลูกทุ่ง / อีสาน">ลูกทุ่ง / อีสาน</option><option value="เพื่อชีวิต">เพื่อชีวิต</option><option value="สากลเก่า">สากลเก่า</option><option value="สากลปัจจุบัน">สากลปัจจุบัน</option></select></div>
          <div class="form-group">
            <label>นักร้อง</label>
            <div class="singer-pills">
              <div class="singer-pill"><input type="radio" name="singer" id="s-male" value="ชาย"><label for="s-male">🎤 ชาย</label></div>
              <div class="singer-pill"><input type="radio" name="singer" id="s-female" value="หญิง"><label for="s-female">🎤 หญิง</label></div>
              <div class="singer-pill"><input type="radio" name="singer" id="s-duet" value="ชาย/หญิง"><label for="s-duet">🎤🎤 คู่</label></div>
            </div>
          </div>
          <div style="display:flex;gap:var(--spacing-md);justify-content:flex-end;margin-top:var(--spacing-md)">
            <a href="songs.html" class="btn btn-secondary">ยกเลิก</a>
            <button type="submit" class="btn btn-primary" id="saveBtn">💾 บันทึก</button>
          </div>
        </form>
      </div>
    </div>
  </main>
  <script src="js/i18n.js"></script>
  <script src="js/app.js"></script>
  <script src="js/nav.js"></script>
  <script>
  var MOOD_HINTS = {
    'มัน / สนุก':        '🎉 เพลงเร็ว เต้นได้ สนุกสนาน • เหมาะเปิดงาน เซกชั่นมัน หรือปาร์ตี้',
    'หวาน / โรแมนติก':  '❤️ เพลงรักช้า อ่อนหวาน • เหมาะงานแต่ง โมเมนต์คู่รัก หรืองานเลี้ยง',
    'เศร้า / อกหัก':    '💔 เพลงโศก คิดถึง อาลัย • เหมาะช่วงเนิบช้าที่ต้องการอารมณ์',
    'นิ่ง / ผ่อนคลาย':  '🌿 เพลง Chill เบาๆ • เหมาะบรรยากาศผ่อนคลาย งานเลี้ยงพักผ่อน',
    'ฮึกเหิม / ยิ่งใหญ่':'🔥 เพลงอลังการ ทรงพลัง • เหมาะเปิด/ปิดโชว์ใหญ่ หรือไฮไลต์งาน'
  };
  function updateMoodHint(selId, hintId) {
    var v = document.getElementById(selId).value;
    var h = document.getElementById(hintId);
    if (h) h.textContent = MOOD_HINTS[v] || '';
  }
  document.addEventListener('DOMContentLoaded', function() {
    requireAuth();
      checkAdGate(); renderMainNav('mainNav'); applyTranslations();
    // แสดง banner เชิญชวนให้เลือกจากคลังกลาง เฉพาะเมื่อมีวงที่ login อยู่
    if (localStorage.getItem('bandId')) {
      var banner = document.getElementById('selectModeBanner');
      if (banner) banner.style.display = 'flex';
    }
    // โหลดรายชื่อศิลปินจาก master list
    apiCall('getArtists', {}, function(r) {
      if (r && r.success && r.data) {
        var dl = document.getElementById('artistDatalist');
        r.data.forEach(function(a) {
          var opt = document.createElement('option');
          opt.value = a.name;
          dl.appendChild(opt);
        });
      }
    });
    document.getElementById('addSongForm').addEventListener('submit', function(e) {
      e.preventDefault();
      var btn = document.getElementById('saveBtn');
      btn.disabled = true; btn.textContent = 'กำลังบันทึก...';
      var singerRadio = document.querySelector('input[name="singer"]:checked');
      var bandId   = localStorage.getItem('bandId')   || '';
      var bandName = localStorage.getItem('bandName') || '';
      apiCall('addSong', {
        name:     document.getElementById('songName').value.trim(),
        artist:   document.getElementById('artist').value.trim(),
        key:      document.getElementById('key').value,
        bpm:      parseInt(document.getElementById('bpm').value) || 0,
        era:      document.getElementById('era').value.trim(),
        tags:     document.getElementById('genre').value.trim(),
        singer:   singerRadio ? singerRadio.value : '',
        mood:     document.getElementById('mood').value.trim(),
        bandId:   bandId,
        bandName: bandName
      }, function(r) {
        btn.disabled = false; btn.textContent = '💾 บันทึก';
        if (r && r.success) {
          // auto-save artist to master table
          var art = document.getElementById('artist').value.trim();
          if (art) apiCall('ensureArtist', { name: art });
          try { sessionStorage.removeItem('songs_cache_' + (bandId || bandName)); } catch(ex) {}
          showToast('เพิ่มเพลงเรียบร้อย', 'success');
          setTimeout(function() { window.location.href = 'songs.html'; }, 1000);
        } else showToast((r && r.message) || 'เกิดข้อผิดพลาด', 'error');
      });
    });
  });
  </script>
</body>
</html>
