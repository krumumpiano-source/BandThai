<!DOCTYPE html>
<html lang="th">
<head>
  <meta charset="UTF-8">
  <meta name="google-adsense-account" content="ca-pub-6824376916256036">
  <script async src="https://pagead2.googlesyndication.com/pagead/js/adsbygoogle.js?client=ca-pub-6824376916256036" crossorigin="anonymous"></script>
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <link rel="manifest" href="manifest.json">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="theme-color" content="#1a1a1a">
  <title>เบิกจ่ายงานนอก — Band Management By SoulCiety</title>
  <link href="https://fonts.googleapis.com/css2?family=Kanit:wght@400;600;700&family=Sarabun:wght@400;500;600&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="css/theme.css">
  <link rel="stylesheet" href="css/nav.css">
  <link rel="stylesheet" href="css/compat.css">
  <style>
    .ep-tabs{display:flex;gap:0;border-bottom:2px solid var(--premium-border);margin-bottom:var(--spacing-xl)}
    .ep-tab{padding:10px 24px;background:none;border:none;cursor:pointer;font-size:var(--text-sm);font-weight:600;font-family:var(--font-family-body);color:var(--premium-text-muted);border-bottom:3px solid transparent;margin-bottom:-2px;transition:all .2s}
    .ep-tab.active{color:var(--premium-gold);border-bottom-color:var(--premium-gold)}
    .ep-panel{display:none}.ep-panel.active{display:block}
    .job-card{background:var(--premium-white);border-radius:var(--radius-lg);box-shadow:var(--shadow-md);margin-bottom:var(--spacing-xl);overflow:hidden;border:1px solid var(--premium-border)}
    .job-card-header{padding:var(--spacing-lg) var(--spacing-xl);background:linear-gradient(135deg,#1a202c,#2d3748);color:#fff;display:flex;align-items:flex-start;gap:var(--spacing-md);flex-wrap:wrap}
    .job-date-badge{background:var(--premium-gold);color:#1a1a1a;border-radius:var(--radius-md);padding:8px 14px;text-align:center;flex-shrink:0;min-width:56px}
    .job-date-badge .dd{font-size:22px;font-weight:700;line-height:1}
    .job-date-badge .mm{font-size:10px;font-weight:600;text-transform:uppercase}
    .job-head-info{flex:1}
    .job-head-info h3{font-size:var(--text-md);font-weight:700;margin:0 0 4px;color:#fff}
    .job-head-info .meta{font-size:var(--text-xs);color:#a0aec0;line-height:1.7}
    .job-head-info .meta strong{color:#e2e8f0}
    .job-badge-row{display:flex;gap:6px;flex-wrap:wrap;margin-top:8px}
    .badge{display:inline-block;padding:3px 10px;border-radius:99px;font-size:11px;font-weight:700}
    .badge-gold{background:#fef3c7;color:#92400e}.badge-green{background:#d1fae5;color:#065f46}
    .badge-red{background:#fee2e2;color:#991b1b}.badge-blue{background:#dbeafe;color:#1e40af}
    .badge-gray{background:#f3f4f6;color:#4b5563}
    .job-body{padding:var(--spacing-lg) var(--spacing-xl)}
    .job-fee-summary{display:flex;gap:var(--spacing-md);flex-wrap:wrap;margin-bottom:var(--spacing-lg);background:var(--premium-off-white);border-radius:var(--radius-md);padding:var(--spacing-md) var(--spacing-lg)}
    .fee-stat{text-align:center;flex:1;min-width:80px}
    .fee-stat .val{font-size:var(--text-xl);font-weight:700}
    .fee-stat .val.green{color:#276749}.fee-stat .val.red{color:#c53030}.fee-stat .val.gold{color:#b7791f}
    .fee-stat .lbl{font-size:10px;color:var(--premium-text-muted);margin-top:2px}
    .member-fee-row{display:flex;align-items:center;gap:var(--spacing-md);padding:var(--spacing-sm) 0;border-bottom:1px solid var(--premium-light-gray);flex-wrap:wrap}
    .member-fee-row:last-child{border-bottom:none}
    .mf-avatar{width:36px;height:36px;border-radius:var(--radius-full);background:var(--premium-light-gray);display:flex;align-items:center;justify-content:center;font-size:16px;flex-shrink:0}
    .mf-info{flex:1;min-width:120px}.mf-info .name{font-weight:600;font-size:var(--text-sm)}.mf-info .instrument{font-size:var(--text-xs);color:var(--premium-text-muted)}
    .mf-fee{font-size:var(--text-md);font-weight:700;color:#276749;min-width:90px;text-align:right}
    .mf-status{min-width:80px;text-align:center}.mf-action{min-width:100px;text-align:right}
    .btn-pay{padding:6px 16px;border-radius:var(--radius-full);border:2px solid #276749;background:#fff;color:#276749;cursor:pointer;font-size:var(--text-xs);font-weight:700;font-family:var(--font-family-body);transition:all .2s}
    .btn-pay:hover{background:#276749;color:#fff}.btn-pay.paid{background:#d1fae5;color:#065f46;border-color:#6ee7b7;cursor:default}
    .job-detail-toggle{background:none;border:none;cursor:pointer;color:var(--premium-gold);font-size:var(--text-xs);font-weight:700;font-family:var(--font-family-body);padding:0}
    .job-detail-panel{display:none;margin-top:var(--spacing-md);padding:var(--spacing-md);background:var(--premium-off-white);border-radius:var(--radius-md);font-size:var(--text-sm);line-height:1.9}
    .job-detail-panel.open{display:block}
    .detail-grid{display:grid;grid-template-columns:1fr 1fr;gap:var(--spacing-md)}
    @media(max-width:600px){.detail-grid{grid-template-columns:1fr}}
    .detail-section h4{font-size:var(--text-xs);font-weight:700;color:var(--premium-text-muted);text-transform:uppercase;margin:0 0 6px;border-bottom:1px solid var(--premium-border);padding-bottom:4px}
    .detail-row{display:flex;gap:8px;margin-bottom:2px}.detail-label{color:var(--premium-text-muted);min-width:120px;flex-shrink:0;font-size:var(--text-xs)}.detail-val{font-weight:600;font-size:var(--text-xs)}
    .job-actions{display:flex;gap:var(--spacing-sm);justify-content:flex-end;padding:var(--spacing-md) var(--spacing-xl);border-top:1px solid var(--premium-light-gray);background:var(--premium-off-white)}
    .pay-modal-backdrop{position:fixed;inset:0;background:rgba(0,0,0,.55);z-index:1000;display:flex;align-items:center;justify-content:center;padding:var(--spacing-md)}
    .pay-modal-box{background:#fff;border-radius:var(--radius-xl);padding:var(--spacing-xl);max-width:360px;width:100%;box-shadow:0 20px 60px rgba(0,0,0,.3)}
    .pay-modal-box h3{font-size:var(--text-md);font-weight:700;margin:0 0 var(--spacing-md)}
    .modal-actions{display:flex;gap:var(--spacing-sm);justify-content:flex-end;margin-top:var(--spacing-lg)}
    .ep-empty{text-align:center;padding:var(--spacing-2xl);color:var(--premium-text-muted)}
    .ep-empty .icon{font-size:48px;margin-bottom:var(--spacing-md)}
  </style>
</head>
<body>
  <div id="mainNav"></div>
  <div id="toast"></div>
  <div id="confirmModal"></div>

  <div id="payModal" class="pay-modal-backdrop" style="display:none">
    <div class="pay-modal-box">
      <h3>💰 เบิกจ่ายให้ <span id="payModalName"></span></h3>
      <div class="form-group"><label>ค่าตัว</label><div style="font-size:var(--text-xl);font-weight:700;color:#276749" id="payModalFee"></div></div>
      <div class="form-group"><label>วันที่จ่าย</label><input type="date" id="payModalDate"></div>
      <div class="form-group"><label>วิธีการจ่าย</label>
        <select id="payModalMethod">
          <option value="โอนเงิน">โอนเงิน</option>
          <option value="เงินสด">เงินสด</option>
          <option value="พร้อมเพย์">พร้อมเพย์</option>
          <option value="อื่นๆ">อื่นๆ</option>
        </select>
      </div>
      <div class="modal-actions">
        <button class="btn btn-ghost" onclick="closePayModal()">ยกเลิก</button>
        <button class="btn btn-primary" id="payModalConfirmBtn" onclick="doPayMember()">✅ ยืนยันจ่าย</button>
      </div>
    </div>
  </div>

  <main><div class="container">
    <div class="page-header">
      <h1 class="page-title">💵 เบิกจ่ายงานนอก</h1>
      <a href="job-calculator.html" class="btn btn-primary btn-sm">➕ คำนวณงานใหม่</a>
    </div>
    <div class="ep-tabs">
      <button class="ep-tab active" onclick="switchTab('jobs')">🎤 งานนอก</button>
      <button class="ep-tab" onclick="switchTab('external')">👤 จ่ายคนนอกวง</button>
    </div>

    <div id="panel-jobs" class="ep-panel active">
      <div id="jobsLoading" style="text-align:center;padding:var(--spacing-xl);color:var(--premium-text-muted)">⏳ กำลังโหลด...</div>
      <div id="jobsList"></div>
    </div>

    <div id="panel-external" class="ep-panel">
      <div class="card" style="max-width:600px;margin-bottom:var(--spacing-xl)">
        <div class="card-header"><h3 class="card-title">💸 จ่ายค่าตัวคนนอกวง</h3></div>
        <form id="payoutForm" style="padding:var(--spacing-lg)">
          <div class="form-group"><label>ชื่อผู้รับเงิน *</label><input type="text" id="payeeName" required></div>
          <div class="form-group"><label>ประเภท</label>
            <select id="payeeType">
              <option value="นักดนตรีเกสต์">นักดนตรีเกสต์</option>
              <option value="นักร้องเกสต์">นักร้องเกสต์</option>
              <option value="เทคนิเชียน">เทคนิเชียน</option>
              <option value="อื่นๆ">อื่นๆ</option>
            </select>
          </div>
          <div class="form-group"><label>ค่าตัว (บาท) *</label><input type="number" id="epAmount" min="0" required></div>
          <div class="form-group"><label>วันที่</label><input type="date" id="epDate"></div>
          <div class="form-group"><label>หมายเหตุ</label><textarea id="epNotes" rows="2"></textarea></div>
          <div style="display:flex;justify-content:flex-end"><button type="submit" class="btn btn-primary" id="epSaveBtn">บันทึก</button></div>
        </form>
      </div>
      <div class="card">
        <div class="card-header"><h3 class="card-title">ประวัติ</h3></div>
        <div class="table-responsive">
          <table class="table"><thead><tr><th>ผู้รับ</th><th>ประเภท</th><th>จำนวนเงิน</th><th>วันที่</th><th>หมายเหตุ</th><th></th></tr></thead>
          <tbody id="payoutBody"><tr><td colspan="6" class="text-center">⏳ กำลังโหลด...</td></tr></tbody></table>
        </div>
      </div>
    </div>
  </div></main>

  <script src="js/i18n.js"></script>
  <script src="js/app.js"></script>
  <script src="js/nav.js"></script>
  <script>
  function switchTab(tab) {
    document.querySelectorAll('.ep-tab').forEach(function(b, i) {
      b.classList.toggle('active', (i===0&&tab==='jobs')||(i===1&&tab==='external'));
    });
    document.getElementById('panel-jobs').classList.toggle('active', tab==='jobs');
    document.getElementById('panel-external').classList.toggle('active', tab==='external');
    if (tab === 'external') loadPayouts();
  }

  var _payTarget = null;

  function loadJobs() {
    document.getElementById('jobsLoading').style.display = 'block';
    document.getElementById('jobsList').innerHTML = '';
    apiCall('getExternalJobs', {}, function(r) {
      document.getElementById('jobsLoading').style.display = 'none';
      var jobs = (r && r.data) || [];
      if (!jobs.length) {
        document.getElementById('jobsList').innerHTML =
          '<div class="ep-empty"><div class="icon">🎤</div><p>ยังไม่มีงานนอก</p>'
          + '<p style="font-size:var(--text-sm)">เมื่อยืนยันสัญญาจ้าง งานจะปรากฏที่นี่</p>'
          + '<a href="job-calculator.html" class="btn btn-primary" style="margin-top:var(--spacing-md)">➕ คำนวณงานใหม่</a></div>';
        return;
      }
      document.getElementById('jobsList').innerHTML = jobs.map(buildJobCard).join('');
      var params = new URLSearchParams(window.location.search);
      var targetId = params.get('jobId');
      if (targetId) {
        var el = document.getElementById('job-' + targetId);
        if (el) { setTimeout(function(){ el.scrollIntoView({ behavior:'smooth', block:'start' }); }, 300); el.style.outline = '3px solid var(--premium-gold)'; }
      }
    });
  }

  function buildJobCard(job) {
    var ds = job.eventDate || '';
    var d = ds ? new Date(ds + 'T00:00:00') : null;
    var dd = d ? String(d.getDate()).padStart(2,'0') : '--';
    var mm = d ? d.toLocaleString('th-TH',{month:'short'}) : '--';
    var fees   = Array.isArray(job.memberFees) ? job.memberFees : [];
    var total  = fees.reduce(function(s,m){ return s+(m.fee||0); }, 0);
    var paid   = fees.reduce(function(s,m){ return s+(m.paid?(m.fee||0):0); }, 0);
    var paidCt = fees.filter(function(m){ return m.paid; }).length;

    var sBadge = job.payoutStatus==='paid' ? '<span class="badge badge-green">✅ จ่ายครบ</span>'
      : job.payoutStatus==='partial' ? '<span class="badge badge-gold">⏳ จ่ายบางส่วน</span>'
      : '<span class="badge badge-gray">⏸ รอเบิกจ่าย</span>';
    var jBadge = job.status==='completed' ? '<span class="badge badge-blue">🎉 งานเสร็จ</span>'
      : job.status==='cancelled' ? '<span class="badge badge-red">❌ ยกเลิก</span>'
      : '<span class="badge badge-gold">📅 ยืนยันแล้ว</span>';

    var travel = (job.travelInfo && typeof job.travelInfo === 'object') ? job.travelInfo : {};
    var accom  = (job.accommodation && typeof job.accommodation === 'object') ? job.accommodation : {};
    var food   = (job.foodInfo && typeof job.foodInfo === 'object') ? job.foodInfo : {};

    var membHtml = fees.length ? fees.map(function(mf) {
      var isPaid = !!mf.paid;
      var jId = esc(job.id||''), mId = esc(mf.memberId||''), mNm = esc(mf.name||'ไม่ระบุ');
      return '<div class="member-fee-row">'
        +'<div class="mf-avatar">🎵</div>'
        +'<div class="mf-info"><div class="name">'+esc(mf.name||'ไม่ระบุ')+'</div><div class="instrument">'+esc(mf.instrument||'')+'</div></div>'
        +'<div class="mf-fee">'+fmt(mf.fee||0)+'</div>'
        +'<div class="mf-status">'+(isPaid
          ? '<span style="color:#065f46;font-size:11px;font-weight:700">✅ จ่ายแล้ว<br><span style="font-weight:400;color:var(--premium-text-muted)">'+esc(mf.paidDate||'')+'</span></span>'
          : '<span style="color:#c53030;font-size:11px;font-weight:700">⏸ รอจ่าย</span>')+'</div>'
        +'<div class="mf-action">'
        +(isPaid ? '<button class="btn-pay paid" disabled>จ่ายแล้ว ✅</button>'
          : '<button class="btn-pay" onclick="openPayModal(\''+jId+'\',\''+mId+'\',\''+mNm+'\','+(mf.fee||0)+')">💰 เบิกจ่าย</button>')
        +'</div></div>';
    }).join('') : '<p style="color:var(--premium-text-muted);font-size:var(--text-sm);padding:8px 0">ไม่มีข้อมูลสมาชิก</p>';

    var detHtml =
      '<div class="detail-grid">'
      +'<div class="detail-section"><h4>🚗 การเดินทาง</h4>'
      +(travel.origin?'<div class="detail-row"><span class="detail-label">จุดเริ่มต้น</span><span class="detail-val">'+esc(travel.origin)+'</span></div>':'')
      +(travel.destination?'<div class="detail-row"><span class="detail-label">ปลายทาง</span><span class="detail-val">'+esc(travel.destination)+'</span></div>':'')
      +(travel.distanceKm?'<div class="detail-row"><span class="detail-label">ระยะทาง</span><span class="detail-val">'+travel.distanceKm+' กม. (ไป-กลับ)</span></div>':'')
      +(travel.travelCost?'<div class="detail-row"><span class="detail-label">ค่าเดินทาง</span><span class="detail-val">'+fmt(travel.travelCost)+'</span></div>':'')
      +(!travel.origin&&!travel.destination?'<span style="color:var(--premium-text-muted);font-size:11px">ไม่มีข้อมูล</span>':'')
      +'</div>'
      +'<div class="detail-section"><h4>🏨 ที่พัก</h4>'
      +(accom.hasAccom
        ?'<div class="detail-row"><span class="detail-label">โรงแรม</span><span class="detail-val">'+esc(accom.hotel||'—')+'</span></div>'
        +'<div class="detail-row"><span class="detail-label">ห้อง/คืน</span><span class="detail-val">'+(accom.rooms||0)+' ห้อง × '+(accom.nights||0)+' คืน</span></div>'
        +(accom.accomCost?'<div class="detail-row"><span class="detail-label">ค่าที่พัก</span><span class="detail-val">'+fmt(accom.accomCost)+'</span></div>':'')
        :'<span style="color:var(--premium-text-muted);font-size:11px">ไม่มีที่พัก</span>')
      +'</div>'
      +'<div class="detail-section"><h4>🍱 อาหาร</h4>'
      +(food.hasFood
        ?'<div class="detail-row"><span class="detail-label">คน/มื้อ/วัน</span><span class="detail-val">'+(food.people||0)+' คน × '+(food.meals||0)+' มื้อ × '+(food.days||0)+' วัน</span></div>'
        +(food.foodCost?'<div class="detail-row"><span class="detail-label">ค่าอาหาร</span><span class="detail-val">'+fmt(food.foodCost)+'</span></div>':'')
        :'<span style="color:var(--premium-text-muted);font-size:11px">ไม่มีค่าอาหาร</span>')
      +'</div>'
      +'<div class="detail-section"><h4>💰 สรุปการเงิน</h4>'
      +'<div class="detail-row"><span class="detail-label">รับจากลูกค้า</span><span class="detail-val" style="color:#b7791f">'+fmt(job.totalFee||0)+'</span></div>'
      +'<div class="detail-row"><span class="detail-label">ค่าใช้จ่ายอื่น</span><span class="detail-val">'+fmt(job.otherExpenses||0)+'</span></div>'
      +'<div class="detail-row"><span class="detail-label">หักกองกลาง</span><span class="detail-val">'+fmt(job.bandFundCut||0)+'</span></div>'
      +'<div class="detail-row"><span class="detail-label">ค่าตัวสมาชิก</span><span class="detail-val" style="color:#276749;font-weight:700">'+fmt(total)+'</span></div>'
      +'</div></div>';

    return '<div id="job-'+esc(job.id||'')+'" class="job-card">'
      +'<div class="job-card-header">'
        +'<div class="job-date-badge"><div class="dd">'+dd+'</div><div class="mm">'+mm+'</div></div>'
        +'<div class="job-head-info">'
          +'<h3>'+esc(job.jobName||'งานนอก')+'</h3>'
          +'<div class="meta">📍 <strong>'+esc(job.venue||'ไม่ระบุ')+'</strong>'
            +(job.clientName?' | 👤 <strong>'+esc(job.clientName)+'</strong>':'')
            +(job.startTime?' | ⏰ <strong>'+esc(job.startTime)+(job.endTime?' – '+esc(job.endTime):'')+' น.</strong>':'')
            +'<br>รับจากลูกค้า: <strong>'+fmt(job.totalFee||0)+'</strong> | จ่ายแล้ว: <strong>'+fmt(paid)+'</strong>/'+fmt(total)+' ('+paidCt+'/'+fees.length+' คน)</div>'
          +'<div class="job-badge-row">'+jBadge+' '+sBadge+'</div>'
        +'</div>'
      +'</div>'
      +'<div class="job-body">'
        +'<div class="job-fee-summary">'
          +'<div class="fee-stat"><div class="val gold">'+fmt(job.totalFee||0)+'</div><div class="lbl">รับจากลูกค้า</div></div>'
          +'<div class="fee-stat"><div class="val green">'+fmt(paid)+'</div><div class="lbl">จ่ายแล้ว</div></div>'
          +'<div class="fee-stat"><div class="val red">'+fmt(total-paid)+'</div><div class="lbl">ค้างจ่าย</div></div>'
          +'<div class="fee-stat"><div class="val">'+paidCt+'/'+fees.length+'</div><div class="lbl">สมาชิก</div></div>'
        +'</div>'
        +membHtml
        +'<div style="margin-top:var(--spacing-md)">'
          +'<button class="job-detail-toggle" onclick="toggleDetail(this)">▶ รายละเอียดเดินทาง / ที่พัก / ค่าใช้จ่าย</button>'
          +'<div class="job-detail-panel">'+detHtml+'</div>'
        +'</div>'
      +'</div>'
      +'<div class="job-actions">'
        +(job.status!=='completed'?'<button class="btn btn-ghost btn-sm" onclick="markJobComplete(\''+esc(job.id||'')+'\')">🎉 งานเสร็จสิ้น</button>':'')
        +'<button class="btn btn-ghost btn-sm" onclick="deleteJob(\''+esc(job.id||'')+'\')">🗑️ ลบ</button>'
      +'</div></div>';
  }

  function toggleDetail(btn) {
    var p = btn.nextElementSibling;
    var open = p.classList.toggle('open');
    btn.textContent = (open?'▼ ':'▶ ') + 'รายละเอียดเดินทาง / ที่พัก / ค่าใช้จ่าย';
  }

  function markJobComplete(jobId) {
    showConfirm('ยืนยันงานเสร็จสิ้น','ยืนยันว่างานนี้เสร็จสิ้นแล้ว?').then(function(ok){
      if (!ok) return;
      apiCall('updateExternalJob',{jobId:jobId,status:'completed'},function(r){
        if(r&&r.success){showToast('อัปเดตสำเร็จ','success');loadJobs();}
        else showToast((r&&r.message)||'เกิดข้อผิดพลาด','error');
      });
    });
  }

  function deleteJob(jobId) {
    showConfirm('ลบงานนอก','ยืนยันลบงานนี้? ข้อมูลจะหายถาวร').then(function(ok){
      if (!ok) return;
      apiCall('deleteExternalJob',{jobId:jobId},function(r){
        if(r&&r.success){showToast('ลบแล้ว','success');loadJobs();}
        else showToast((r&&r.message)||'เกิดข้อผิดพลาด','error');
      });
    });
  }

  function openPayModal(jobId, memberId, name, fee) {
    _payTarget = { jobId: jobId, memberId: memberId };
    document.getElementById('payModalName').textContent = name;
    document.getElementById('payModalFee').textContent  = (fee||0).toLocaleString('th-TH') + ' บาท';
    document.getElementById('payModalDate').value = (function(d){ return d.getFullYear() + '-' + String(d.getMonth()+1).padStart(2,'0') + '-' + String(d.getDate()).padStart(2,'0'); })(new Date());
    document.getElementById('payModal').style.display = 'flex';
  }
  function closePayModal() { document.getElementById('payModal').style.display='none'; _payTarget=null; }

  function doPayMember() {
    if (!_payTarget) return;
    var btn = document.getElementById('payModalConfirmBtn');
    btn.disabled = true; btn.textContent = '⏳ กำลังบันทึก...';
    apiCall('payMemberForJob',{
      jobId:         _payTarget.jobId,
      memberId:      _payTarget.memberId,
      paidDate:      document.getElementById('payModalDate').value,
      paymentMethod: document.getElementById('payModalMethod').value
    }, function(r){
      btn.disabled=false; btn.textContent='✅ ยืนยันจ่าย';
      closePayModal();
      if(r&&r.success){showToast('บันทึกการจ่ายเงินสำเร็จ ✅','success');loadJobs();}
      else showToast((r&&r.message)||'เกิดข้อผิดพลาด','error');
    });
  }

  document.getElementById('payoutForm').addEventListener('submit', function(e){
    e.preventDefault();
    var btn=document.getElementById('epSaveBtn'); btn.disabled=true; btn.textContent='⏳';
    apiCall('addExternalPayout',{
      payeeName: document.getElementById('payeeName').value.trim(),
      payeeType: document.getElementById('payeeType').value,
      amount:    document.getElementById('epAmount').value,
      date:      document.getElementById('epDate').value,
      notes:     document.getElementById('epNotes').value
    }, function(r){
      btn.disabled=false; btn.textContent='บันทึก';
      if(r&&r.success){showToast('บันทึกสำเร็จ','success');document.getElementById('payoutForm').reset();document.getElementById('epDate').value=(function(d){ return d.getFullYear() + '-' + String(d.getMonth()+1).padStart(2,'0') + '-' + String(d.getDate()).padStart(2,'0'); })(new Date());loadPayouts();}
      else showToast((r&&r.message)||'เกิดข้อผิดพลาด','error');
    });
  });

  function loadPayouts(){
    apiCall('getAllExternalPayouts',{},function(r){
      var rows=(r&&r.data)||[];
      var tbody=document.getElementById('payoutBody');
      if(!rows.length){tbody.innerHTML='<tr><td colspan="6" class="text-center">ไม่มีข้อมูล</td></tr>';return;}
      tbody.innerHTML=rows.map(function(row){
        return '<tr><td>'+esc(row.payeeName||'')+'</td><td>'+esc(row.payeeType||'')+'</td>'
          +'<td>'+fmt(row.amount||0)+'</td><td>'+esc(row.date||'')+'</td>'
          +'<td>'+esc(row.notes||'')+'</td>'
          +'<td><button class="btn btn-danger btn-sm" onclick="delPayout(\''+esc(row.id||'')+'\')">🗑️</button></td></tr>';
      }).join('');
    });
  }

  function delPayout(id){
    showConfirm('ลบรายการ','ยืนยันลบ?').then(function(ok){
      if(!ok) return;
      apiCall('deleteExternalPayout',{payoutId:id},function(r){
        if(r&&r.success){showToast('ลบแล้ว','success');loadPayouts();}
        else showToast((r&&r.message)||'เกิดข้อผิดพลาด','error');
      });
    });
  }

  function esc(s){ var d=document.createElement('div'); d.textContent=s||''; return d.innerHTML; }
  function fmt(n){ return (n||0).toLocaleString('th-TH')+' ฿'; }

  document.addEventListener('DOMContentLoaded', function(){
    requireAuth(); renderMainNav('mainNav');
    if(typeof applyTranslations==='function') applyTranslations();
    document.getElementById('epDate').value = (function(d){ return d.getFullYear() + '-' + String(d.getMonth()+1).padStart(2,'0') + '-' + String(d.getDate()).padStart(2,'0'); })(new Date());
    loadJobs();
  });
  </script>
</body>
</html>
