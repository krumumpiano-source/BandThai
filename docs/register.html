<!DOCTYPE html>
<html lang="th">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
  <link rel="manifest" href="manifest.json">
  <link rel="apple-touch-icon" sizes="180x180" href="icons/apple-touch-icon-180.png">
  <link rel="icon" type="image/png" sizes="32x32" href="icons/favicon-32.png">
  <meta name="mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="theme-color" content="#1a1a1a">
  <title>สมัครสมาชิก — BandThai</title>
  <!-- OG Tags -->
  <meta property="og:type" content="website">
  <meta property="og:title" content="เข้าร่วมวง — BandThai">
  <meta property="og:description" content="คุณได้รับเชิญเข้าร่วมวง! สมัครฟรี ใช้งานได้ทันที">
  <meta property="og:image" content="https://krumumpiano-source.github.io/BandThai/icons/icon-512.png">
  <meta property="og:url" content="https://krumumpiano-source.github.io/BandThai/register.html">
  <link href="https://fonts.googleapis.com/css2?family=Kanit:wght@400;600;700&family=Sarabun:wght@400;500;600&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="css/theme.css">
  <link rel="stylesheet" href="css/compat.css">
  <style>
    body{display:flex;align-items:center;justify-content:center;min-height:100vh;padding:var(--spacing-md)}
    .auth-wrap{width:100%;max-width:520px}
    .auth-card{background:var(--premium-white);border-radius:var(--radius-xl);box-shadow:var(--shadow-2xl);padding:var(--spacing-2xl)}
    .auth-logo{text-align:center;margin-bottom:var(--spacing-xl)}
    .auth-logo h1{font-family:var(--font-family-display);font-size:var(--text-2xl);font-weight:700;color:var(--premium-gold)}
    .btn-full{width:100%;justify-content:center;padding:12px;font-size:var(--text-base);margin-top:var(--spacing-sm)}
    .err-msg{color:#c53030;font-size:var(--text-xs);margin-top:4px;min-height:16px}
    .auth-footer{text-align:center;margin-top:var(--spacing-lg);font-size:var(--text-sm);color:var(--premium-text-light)}
    .auth-footer a{color:var(--premium-gold);font-weight:600;text-decoration:none}
    .form-row{display:grid;grid-template-columns:1fr 1fr;gap:var(--spacing-md)}
    @media(max-width:480px){.form-row{grid-template-columns:1fr}}
    .info-box{background:linear-gradient(135deg,#eff6ff,#dbeafe);border:1px solid #93c5fd;border-radius:var(--radius-lg);padding:var(--spacing-md);margin-bottom:var(--spacing-md);font-size:var(--text-sm);color:#1e40af;line-height:1.7}
    .info-box strong{color:#1e3a8a}
    .invite-preview{background:linear-gradient(135deg,#f0fdf4,#dcfce7);border:2px solid #22c55e;border-radius:var(--radius-lg);padding:var(--spacing-md);margin-top:var(--spacing-sm);display:none}
    .invite-preview.show{display:block}
    .invite-preview.error{background:#fff5f5;border-color:#fc8181}
    .invite-preview .band-name{font-size:var(--text-lg);font-weight:700;color:#166534}
    .invite-preview .band-meta{font-size:var(--text-sm);color:#15803d;margin-top:2px}
    .invite-preview.error .band-name{color:#c53030}
    .invite-preview.error .band-meta{color:#fc8181}
    .create-band-link{display:block;text-align:center;margin-top:var(--spacing-md);padding:var(--spacing-md);background:linear-gradient(135deg,#fefce8,#fef9c3);border:2px dashed var(--premium-gold);border-radius:var(--radius-lg);font-size:var(--text-sm);color:var(--premium-text);text-decoration:none;transition:transform .15s,box-shadow .15s}
    .create-band-link:hover{transform:translateY(-1px);box-shadow:0 4px 12px rgba(203,162,60,.2)}
    .create-band-link strong{color:var(--premium-gold)}
  </style>
</head>
<body>
  <div id="toast"></div>
  <div class="auth-wrap">
    <div class="auth-card">
      <div class="auth-logo">
        <h1>🎵 BandThai</h1>
        <p>สมัครสมาชิกเข้าร่วมวง</p>
      </div>

      <form id="registerForm">
        <!-- Invite code — auto-filled from URL or manual input -->
        <div class="form-group">
          <label>🔑 รหัสประจำวง <span style="color:#c53030">*</span></label>
          <input type="text" id="inviteCode" placeholder="กรอกรหัส 6 หลัก เช่น AB3X7Q" maxlength="6"
            style="text-transform:uppercase;font-family:monospace;font-size:1.3rem;letter-spacing:.25em;text-align:center;padding:14px" autocomplete="off" required>
          <div id="invitePreview" class="invite-preview">
            <div id="previewLoading" style="color:#6b7280;font-size:var(--text-sm)">🔍 กำลังตรวจสอบรหัส...</div>
            <div id="previewInfo" style="display:none">
              <div class="band-name" id="previewBandName"></div>
              <div class="band-meta" id="previewBandMeta"></div>
              <div style="font-size:var(--text-xs);color:#15803d;margin-top:6px" id="previewOk">✅ รหัสถูกต้อง</div>
            </div>
          </div>
        </div>

        <div class="form-group">
          <label>ชื่อเล่น <span style="color:#c53030">*</span></label>
          <input type="text" id="nickname" placeholder="เช่น เอ, บอล, นุ่น" required>
          <div class="err-msg" id="nicknameError"></div>
        </div>

        <div class="form-group">
          <label>อีเมล <span style="color:#c53030">*</span></label>
          <input type="email" id="email" placeholder="กรุณากรอกอีเมล" required>
          <div class="err-msg" id="emailError"></div>
        </div>

        <div class="form-row">
          <div class="form-group">
            <label>รหัสผ่าน <span style="color:#c53030">*</span></label>
            <input type="password" id="password" placeholder="8 ตัวขึ้นไป" required>
            <div class="err-msg" id="passwordError"></div>
          </div>
          <div class="form-group">
            <label>ยืนยันรหัสผ่าน <span style="color:#c53030">*</span></label>
            <input type="password" id="confirmPassword" placeholder="พิมพ์อีกครั้ง" required>
            <div class="err-msg" id="confirmError"></div>
          </div>
        </div>

        <div class="err-msg" id="generalError"></div>

        <button type="submit" class="btn btn-primary btn-full" id="regBtn" disabled>✅ สมัครเข้าร่วมวง</button>
      </form>

      <a href="create-band.html" class="create-band-link">
        🎵 <strong>ยังไม่มีวง?</strong><br>
        <span style="font-size:var(--text-xs);color:var(--premium-text-muted)">สร้างวงใหม่ฟรี ใช้งานได้ทันที</span>
      </a>

      <div class="auth-footer">
        <a href="index.html">เข้าสู่ระบบ</a>
        &nbsp;|&nbsp;
        <a href="terms.html">ข้อกำหนดการใช้งาน</a>
      </div>
    </div>
  </div>
  <script src="js/i18n.js"></script>
  <script src="js/app.js"></script>
  <script>
  document.addEventListener('DOMContentLoaded', function() {

    var inviteValid = false;

    // Pre-fill invite code from URL ?invite=XXXXXX
    var urlInvite = new URLSearchParams(window.location.search).get('invite') || '';
    if (urlInvite) {
      document.getElementById('inviteCode').value = urlInvite.toUpperCase();
      setTimeout(function() {
        document.getElementById('inviteCode').dispatchEvent(new Event('input'));
      }, 300);
    }

    // ── Invite code live preview ──
    var previewTimer = null;
    document.getElementById('inviteCode').addEventListener('input', function() {
      var code = this.value.trim().toUpperCase();
      this.value = code;
      var preview = document.getElementById('invitePreview');
      var loading = document.getElementById('previewLoading');
      var info    = document.getElementById('previewInfo');
      var okMsg   = document.getElementById('previewOk');
      preview.className = 'invite-preview';
      loading.style.display = 'none';
      info.style.display = 'none';
      inviteValid = false;
      document.getElementById('regBtn').disabled = true;
      clearTimeout(previewTimer);
      if (code.length < 6) return;

      preview.className = 'invite-preview show';
      loading.style.display = '';
      previewTimer = setTimeout(function() {
        apiCall('lookupInviteCode', { code: code }, function(r) {
          loading.style.display = 'none';
          if (r && r.success) {
            var province = r.province ? ' (' + r.province + ')' : '';
            document.getElementById('previewBandName').textContent = '🎵 ' + (r.bandName || r.band_name || '');
            document.getElementById('previewBandMeta').textContent =
              province + (r.memberCount || r.member_count ? ' · ' + (r.memberCount || r.member_count) + ' สมาชิก' : '');
            info.style.display = '';
            if (okMsg) okMsg.style.display = '';
            preview.className = 'invite-preview show';
            inviteValid = true;
            document.getElementById('regBtn').disabled = false;
          } else {
            document.getElementById('previewBandName').textContent = '❌ ' + ((r && r.message) || 'รหัสไม่ถูกต้อง');
            document.getElementById('previewBandMeta').textContent = 'กรุณาตรวจสอบรหัสประจำวงอีกครั้ง';
            info.style.display = '';
            if (okMsg) okMsg.style.display = 'none';
            preview.className = 'invite-preview show error';
          }
        });
      }, 500);
    });

    // ── Submit ──
    document.getElementById('registerForm').addEventListener('submit', function(e) {
      e.preventDefault();
      clearErrs();
      var nickname = val('nickname'), email = val('email');
      var pw = document.getElementById('password').value, cpw = document.getElementById('confirmPassword').value;
      var ok = true;
      if (!inviteValid) { err('generalError', 'กรุณากรอกรหัสวงให้ถูกต้อง'); ok = false; }
      if (!nickname) { err('nicknameError', 'กรุณากรอกชื่อเล่น'); ok = false; }
      if (!/^[^\s@]+@[^\s@]+\.[^\s@]+$/.test(email)) { err('emailError', 'อีเมลไม่ถูกต้อง'); ok = false; }
      if (pw.length < 8) { err('passwordError', 'รหัสผ่านต้องมีอย่างน้อย 8 ตัวอักษร'); ok = false; }
      if (pw !== cpw) { err('confirmError', 'รหัสผ่านไม่ตรงกัน'); ok = false; }
      if (!ok) return;

      var btn = document.getElementById('regBtn');
      btn.disabled = true; btn.textContent = '⏳ กำลังสมัคร...';

      apiCall('register', {
        nickname: nickname, firstName: '', lastName: '', title: '', instrument: '',
        name: nickname, email: email, password: pw,
        inviteCode: val('inviteCode').toUpperCase()
      }, function(r) {
        if (r && r.success) {
          if (typeof showToast === 'function') showToast(r.message || 'สมัครสำเร็จ!', 'success');
          setTimeout(function() { window.location.href = 'dashboard.html'; }, 1500);
        } else {
          btn.disabled = false; btn.textContent = '✅ สมัครเข้าร่วมวง';
          err('generalError', (r && r.message) || 'เกิดข้อผิดพลาด กรุณาลองใหม่');
        }
      });
    });

    function val(id) { var el = document.getElementById(id); return el ? el.value.trim() : ''; }
    function err(id, msg) { var el = document.getElementById(id); if (el) el.textContent = msg || ''; }
    function clearErrs() { ['nicknameError','emailError','passwordError','confirmError','generalError'].forEach(function(id){ err(id); }); }
  });
  </script>
</body>
</html>
