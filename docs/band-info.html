<!DOCTYPE html>
<html lang="th">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <link rel="manifest" href="manifest.json">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="theme-color" content="#1a1a1a">
  <title>ข้อมูลวงดนตรี — Band Management By SoulCiety</title>
  <link href="https://fonts.googleapis.com/css2?family=Kanit:wght@400;600;700&family=Sarabun:wght@400;500;600&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="css/theme.css">
  <link rel="stylesheet" href="css/nav.css">
  <link rel="stylesheet" href="css/compat.css">
  <style>
    /* ── Band header ── */
    .band-header-card{background:#fff;border-radius:var(--radius-lg);box-shadow:var(--shadow-sm);padding:var(--spacing-xl);margin-bottom:var(--spacing-xl);display:flex;gap:var(--spacing-xl);align-items:center;flex-wrap:wrap}
    .band-logo{width:72px;height:72px;border-radius:var(--radius-full);background:linear-gradient(135deg,var(--premium-gold),#f5a623);color:#fff;display:flex;align-items:center;justify-content:center;font-size:36px;flex-shrink:0}
    .band-header-info{flex:1;min-width:0}
    .band-header-info h2{margin:0 0 4px;font-size:var(--text-2xl);font-weight:700}
    .band-meta-row{display:flex;gap:var(--spacing-md);flex-wrap:wrap;margin-top:var(--spacing-sm)}
    .band-meta-chip{font-size:var(--text-xs);color:var(--premium-text-muted);display:flex;align-items:center;gap:4px}
    .band-stats{display:flex;gap:var(--spacing-xl);margin-top:var(--spacing-md);flex-wrap:wrap}
    .band-stat{text-align:center}
    .band-stat .stat-val{font-size:var(--text-2xl);font-weight:700;color:var(--premium-gold)}
    .band-stat .stat-lbl{font-size:var(--text-xs);color:var(--premium-text-muted)}

    /* ── Venue schedule ── */
    .venue-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(300px,1fr));gap:var(--spacing-lg);margin-bottom:var(--spacing-xl)}
    .venue-card{background:#fff;border-radius:var(--radius-lg);box-shadow:var(--shadow-sm);overflow:hidden}
    .venue-card-header{background:linear-gradient(135deg,#1a1a2e,#16213e);color:#fff;padding:var(--spacing-md) var(--spacing-lg)}
    .venue-card-header h4{margin:0;font-size:var(--text-base);font-weight:700}
    .venue-card-header .vaddr{font-size:var(--text-xs);color:rgba(255,255,255,.65);margin-top:2px}
    .venue-card-body{padding:var(--spacing-md)}
    .slot-row{display:flex;align-items:center;gap:var(--spacing-md);padding:8px 0;border-bottom:1px solid var(--premium-border)}
    .slot-row:last-child{border-bottom:none}
    .slot-day{font-weight:700;font-size:var(--text-sm);min-width:64px;color:var(--premium-text)}
    .slot-time{font-size:var(--text-sm);color:var(--premium-gold);font-weight:600;min-width:100px}
    .slot-members{display:flex;flex-wrap:wrap;gap:4px}
    .slot-member-pill{font-size:10px;background:var(--premium-off-white);border:1px solid var(--premium-border);border-radius:var(--radius-full);padding:2px 8px;color:var(--premium-text-muted)}

    /* ── Member cards ── */
    .member-cards{display:grid;grid-template-columns:repeat(auto-fill,minmax(280px,1fr));gap:var(--spacing-lg)}
    .member-card{background:#fff;border-radius:var(--radius-lg);box-shadow:var(--shadow-sm);padding:var(--spacing-lg);transition:box-shadow .2s;position:relative;display:flex;gap:var(--spacing-md);align-items:flex-start}
    .member-card:hover{box-shadow:var(--shadow-md)}
    .member-avatar{width:52px;height:52px;border-radius:var(--radius-full);background:var(--premium-gold);color:#fff;display:flex;align-items:center;justify-content:center;font-size:22px;flex-shrink:0;font-weight:700}
    .member-body{flex:1;min-width:0}
    .member-name{font-weight:700;font-size:var(--text-base);margin:0 0 2px}
    .member-position{font-size:11px;background:var(--premium-off-white);border-radius:var(--radius-full);padding:2px 10px;color:var(--premium-text-muted);display:inline-block;margin-bottom:6px}
    .member-contact{font-size:var(--text-xs);color:var(--premium-text-muted);display:flex;flex-direction:column;gap:3px}
    .member-contact a{color:var(--premium-gold);text-decoration:none}
    .member-contact a:hover{text-decoration:underline}
    .card-actions{position:absolute;top:8px;right:8px;display:flex;gap:4px;opacity:0;transition:opacity .2s}
    .member-card:hover .card-actions{opacity:1}
    .status-dot{width:8px;height:8px;border-radius:50%;display:inline-block;margin-right:4px}
    .status-dot.active{background:#48bb78}.status-dot.inactive{background:#a0aec0}
    .member-sched-row{margin-top:8px;padding-top:8px;border-top:1px solid var(--premium-border)}
    .member-sched-title{font-size:10px;font-weight:700;color:var(--premium-text-muted);margin-bottom:4px;text-transform:uppercase;letter-spacing:.05em}
    .sched-pills{display:flex;flex-wrap:wrap;gap:4px}
    .sched-pill{font-size:10px;background:rgba(249,207,69,.12);border:1px solid rgba(249,207,69,.35);color:#b8860b;border-radius:var(--radius-full);padding:2px 8px;white-space:nowrap}

    @media(max-width:600px){
      .band-header-card{flex-direction:column;gap:var(--spacing-md)}
      .venue-grid,.member-cards{grid-template-columns:1fr}
    }
  </style>
</head>
<body>
  <div id="mainNav"></div>
  <div id="toast"></div>
  <div id="confirmModal"></div>

  <!-- Member Modal (admin/manager only) -->
  <div id="memberModal" class="modal-backdrop" style="display:none">
    <div class="modal" style="max-width:520px">
      <div class="modal-header">
        <h3 class="modal-title" id="memberModalTitle">เพิ่มสมาชิก</h3>
        <button class="modal-close" onclick="closeMemberModal()">×</button>
      </div>
      <form id="memberForm">
        <input type="hidden" id="memberId">
        <div style="display:grid;grid-template-columns:1fr 1fr;gap:var(--spacing-md)">
          <div class="form-group"><label>ชื่อ-นามสกุล *</label><input type="text" id="mName" required></div>
          <div class="form-group"><label>ตำแหน่ง / เครื่องดนตรี</label><input type="text" id="mPosition" placeholder="กีตาร์, มือกลอง..."></div>
        </div>
        <div style="display:grid;grid-template-columns:1fr 1fr;gap:var(--spacing-md)">
          <div class="form-group"><label>เบอร์โทร</label><input type="tel" id="mPhone"></div>
          <div class="form-group"><label>อีเมล</label><input type="email" id="mEmail"></div>
        </div>
        <div style="display:grid;grid-template-columns:1fr 1fr;gap:var(--spacing-md)">
          <div class="form-group"><label>ค่าตัว/งาน (บาท)</label><input type="number" id="mRate" min="0" value="1500"></div>
          <div class="form-group"><label>สถานะ</label>
            <select id="mStatus"><option value="active">ใช้งาน</option><option value="inactive">ไม่ใช้งาน</option></select>
          </div>
        </div>
        <div class="form-group"><label>หมายเหตุ</label><textarea id="mNotes" rows="2"></textarea></div>
        <div style="display:flex;justify-content:flex-end;gap:var(--spacing-sm)">
          <button type="button" class="btn btn-secondary" onclick="closeMemberModal()">ยกเลิก</button>
          <button type="button" class="btn btn-danger" id="deleteMemberBtn" style="display:none" onclick="deleteCurrentMember()">ลบ</button>
          <button type="submit" class="btn btn-primary" id="saveMemberBtn">บันทึก</button>
        </div>
      </form>
    </div>
  </div>

  <main>
    <div class="container">
      <div class="page-header">
        <h1 class="page-title">ข้อมูลวง</h1>
        <button class="btn btn-primary" id="addMemberBtn" style="display:none" onclick="openMemberModal(null)">+ เพิ่มสมาชิก</button>
      </div>

      <!-- ── Band header ── -->
      <div class="band-header-card">
        <div class="band-logo">🎵</div>
        <div class="band-header-info">
          <h2 id="bName">—</h2>
          <div class="band-meta-row">
            <div class="band-meta-chip" id="bProvinceChip" style="display:none">📍 <span id="bProvince"></span></div>
            <div class="band-meta-chip" id="bManagerChip" style="display:none">👤 ผู้จัดการ: <span id="bManager"></span></div>
          </div>
          <div class="band-stats">
            <div class="band-stat"><div class="stat-val" id="bMemberCount">—</div><div class="stat-lbl">สมาชิก</div></div>
            <div class="band-stat"><div class="stat-val" id="bVenueCount">—</div><div class="stat-lbl">ร้านที่เล่น</div></div>
            <div class="band-stat"><div class="stat-val" id="bSlotCount">—</div><div class="stat-lbl">รอบ/สัปดาห์</div></div>
          </div>
        </div>
        <div style="text-align:right;flex-shrink:0">
          <a href="band-settings.html" class="btn btn-ghost btn-sm">⚙️ ตั้งค่า</a>
        </div>
      </div>

      <!-- ── Venues & Schedule ── -->
      <div style="margin-bottom:var(--spacing-xl)">
        <h3 style="margin-bottom:var(--spacing-md)">📍 ร้านที่เล่น &amp; ตารางประจำ</h3>
        <div class="venue-grid" id="venueGrid">
          <div style="color:var(--premium-text-muted);font-size:var(--text-sm)">กำลังโหลด...</div>
        </div>
      </div>

      <!-- ── Members ── -->
      <div>
        <div style="display:flex;align-items:center;justify-content:space-between;flex-wrap:wrap;gap:var(--spacing-md);margin-bottom:var(--spacing-md)">
          <h3 style="margin:0">👥 สมาชิกวง</h3>
          <div style="display:flex;gap:var(--spacing-sm)">
            <input type="text" id="memberSearch" placeholder="🔍 ค้นหาชื่อ..." oninput="filterMembers()" style="max-width:200px">
            <select id="statusFilter" onchange="filterMembers()">
              <option value="">ทั้งหมด</option>
              <option value="active">ใช้งาน</option>
              <option value="inactive">ไม่ใช้งาน</option>
            </select>
          </div>
        </div>
        <div class="member-cards" id="memberCards">
          <div style="grid-column:1/-1;text-align:center;padding:32px;color:var(--premium-text-muted)">กำลังโหลด...</div>
        </div>
      </div>
    </div>
  </main>

  <script src="js/i18n.js"></script>
  <script src="js/app.js"></script>
  <script src="js/nav.js"></script>
  <script>
  /* ════════════════════════════════════════════
     Band Info — Band Management By SoulCiety
     (load band-members.js AFTER override is set)
  ════════════════════════════════════════════ */
  var _schedule = {};
  var _venues   = [];
  var DAY_TH    = ['อาทิตย์','จันทร์','อังคาร','พุธ','พฤหัสบดี','ศุกร์','เสาร์'];
  var DAY_SHORT  = ['อา.','จ.','อ.','พ.','พฤ.','ศ.','ส.'];

  </script>
  <script src="js/band-members.js"></script>
  <script>
  /* Override renderMemberCards — assignment after band-members.js, so it wins */
  renderMemberCards = function(members) {
    var container = document.getElementById('memberCards');
    if (!container) return;

    var mc = document.getElementById('bMemberCount');
    if (mc) mc.textContent = (_allMembers||[]).filter(function(m){ return m.status==='active'; }).length;

    if (!members || !members.length) {
      container.innerHTML = '<div style="grid-column:1/-1;text-align:center;padding:32px;color:var(--premium-text-muted)">ไม่พบสมาชิก</div>';
      return;
    }

    var role = localStorage.getItem('userRole') || '';
    var isManager = (role==='admin' || role==='manager');

    container.innerHTML = members.map(function(m) {
      var pills = [];
      Object.keys(_schedule).sort(function(a,b){ return parseInt(a)-parseInt(b); }).forEach(function(dayIdx) {
        (_schedule[dayIdx]||[]).forEach(function(slot) {
          if (!(slot.members||[]).some(function(mr){ return mr.memberId===m.id; })) return;
          var venue = _venues.find(function(v){ return v.id===slot.venueId; });
          pills.push('<span class="sched-pill">'
            + (DAY_SHORT[parseInt(dayIdx)]||'?') + ' ' + (slot.startTime||'?')
            + (venue ? ' · ' + escapeHtml(venue.name) : '') + '</span>');
        });
      });
      var parts = (m.name||'').trim().split(' ');
      var initials = parts.length >= 2
        ? (parts[0][0]||'') + (parts[parts.length-1][0]||'')
        : (parts[0]||'').substring(0,2) || '?';
      return '<div class="member-card">'
        + (isManager ? '<div class="card-actions"><button class="btn btn-ghost btn-sm" onclick="openMemberModal(\'' + escapeHtml(m.id||'') + '\')">✏️</button></div>' : '')
        + '<div class="member-avatar">' + escapeHtml(initials) + '</div>'
        + '<div class="member-body">'
          + '<div class="member-name">' + escapeHtml(m.name||'') + '</div>'
          + '<div class="member-position">' + escapeHtml(m.position||'สมาชิก') + '</div>'
          + '<div class="member-contact">'
            + (m.phone ? '<span>📞 <a href="tel:' + escapeHtml(m.phone) + '">' + escapeHtml(m.phone) + '</a></span>' : '')
            + (m.email ? '<span>✉️ <a href="mailto:' + escapeHtml(m.email) + '">' + escapeHtml(m.email) + '</a></span>' : '')
            + '<span><span class="status-dot ' + (m.status==='active'?'active':'inactive') + '"></span>'
            + (m.status==='active'?'ใช้งาน':'ไม่ใช้งาน') + '</span>'
          + '</div>'
          + (pills.length ? '<div class="member-sched-row"><div class="member-sched-title">📅 ตารางงาน</div><div class="sched-pills">' + pills.join('') + '</div></div>' : '')
        + '</div>'
        + '</div>';
    }).join('');
  };

  filterMembers = function() {
    var q  = (document.getElementById('memberSearch').value||'').toLowerCase();
    var st = document.getElementById('statusFilter').value;
    _filteredMembers = (_allMembers||[]).filter(function(m) {
      return (!st || m.status===st)
        && (!q || (m.name||'').toLowerCase().includes(q) || (m.position||'').toLowerCase().includes(q));
    });
    renderMemberCards(_filteredMembers);
  };

  document.addEventListener('DOMContentLoaded', function() {
    requireAuth();
    renderMainNav('mainNav');
    applyTranslations();

    var role = localStorage.getItem('userRole') || '';
    var isManager = (role === 'admin' || role === 'manager');
    if (isManager) document.getElementById('addMemberBtn').style.display = '';

    // Show band name from localStorage immediately
    var bName = localStorage.getItem('bandName') || '';
    if (bName) document.getElementById('bName').textContent = bName;
    var prov = localStorage.getItem('bandProvince') || '';
    if (prov) { document.getElementById('bProvince').textContent = prov; document.getElementById('bProvinceChip').style.display = 'flex'; }

    // Load members from profiles + settings in parallel
    loadMembers();
    loadBandSettings();
  });

  function loadMembers() {
    apiCall('getBandProfiles', {}, function(r) {
      var profiles = (r && r.success && r.data) ? r.data : [];
      _allMembers = profiles.map(function(p) {
        return {
          id:       p.id,
          name:     p.nickname || p.first_name || p.user_name || p.email || '?',
          position: p.instrument || p.title || '',
          phone:    p.phone || '',
          email:    p.email || '',
          status:   p.status || 'active',
          role:     p.role || ''
        };
      });
      _filteredMembers = _allMembers;
      renderMemberCards(_allMembers);
    });
  }

  function loadBandSettings() {
    apiCall('getBandSettings', {}, function(r) {
      if (!(r && r.success && r.data)) return;
      var d = r.data;
      if (d.bandName) document.getElementById('bName').textContent = d.bandName;
      if (d.bandManager) {
        document.getElementById('bManager').textContent = d.bandManager;
        document.getElementById('bManagerChip').style.display = 'flex';
      }
      if (d.province) {
        document.getElementById('bProvince').textContent = d.province;
        document.getElementById('bProvinceChip').style.display = 'flex';
      }
      _venues   = d.venues   || [];
      _schedule = d.schedule || {};

      // Stats
      var slotCount = 0;
      Object.keys(_schedule).forEach(function(day){ slotCount += (_schedule[day]||[]).length; });
      document.getElementById('bVenueCount').textContent = _venues.length;
      document.getElementById('bSlotCount').textContent  = slotCount;

      renderVenueSchedule();
      // Re-render member cards now that we have schedule data
      if (typeof _allMembers !== 'undefined' && _allMembers.length) {
        renderMemberCards(_filteredMembers.length ? _filteredMembers : _allMembers);
      }
    });
  }

  function renderVenueSchedule() {
    var grid = document.getElementById('venueGrid');
    if (!_venues.length) {
      grid.innerHTML = '<div class="card" style="padding:var(--spacing-xl);color:var(--premium-text-muted);text-align:center">ยังไม่มีข้อมูลร้าน — ตั้งค่าได้ที่หน้า <a href="band-settings.html">ตั้งค่าวง</a></div>';
      return;
    }

    grid.innerHTML = _venues.map(function(venue) {
      var slots = [];
      Object.keys(_schedule).sort(function(a,b){return parseInt(a)-parseInt(b);}).forEach(function(dayIdx) {
        (_schedule[dayIdx]||[]).forEach(function(slot) {
          if (slot.venueId === venue.id) slots.push({ day: parseInt(dayIdx), slot: slot });
        });
      });

      var slotsHtml = slots.length ? slots.map(function(s) {
        var memberNames = (s.slot.members||[]).map(function(mr) {
          var m = typeof _allMembers !== 'undefined' && _allMembers.find(function(x){ return x.id === mr.memberId; });
          return m ? escapeHtml(m.name||'') : '';
        }).filter(Boolean);
        var pills = memberNames.map(function(n){ return '<span class="slot-member-pill">' + n + '</span>'; }).join('');
        return '<div class="slot-row">'
          + '<div class="slot-day">' + (DAY_TH[s.day]||'?') + '</div>'
          + '<div class="slot-time">⏰ ' + (s.slot.startTime||'?') + ' – ' + (s.slot.endTime||'?') + '</div>'
          + (pills ? '<div class="slot-members">' + pills + '</div>' : '')
          + '</div>';
      }).join('') : '<div style="color:var(--premium-text-muted);font-size:var(--text-sm);padding:8px 0">ยังไม่มีรอบที่จัดไว้</div>';

      return '<div class="venue-card">'
        + '<div class="venue-card-header"><h4>🏪 ' + escapeHtml(venue.name||'') + '</h4>'
          + (venue.address ? '<div class="vaddr">📍 ' + escapeHtml(venue.address) + '</div>' : '') + '</div>'
        + '<div class="venue-card-body">' + slotsHtml + '</div>'
        + '</div>';
    }).join('');
  }

  function deleteCurrentMember() {
    var id = document.getElementById('memberId').value;
    showConfirm('ยืนยันการลบ', 'ต้องการลบสมาชิกคนนี้?').then(function(ok) {
      if (!ok) return;
      apiCall('deleteBandMember', { memberId: id }, function(r) {
        if (r && r.success) { showToast('ลบแล้ว', 'success'); closeMemberModal(); loadBandMembers(); }
        else showToast((r && r.message)||'เกิดข้อผิดพลาด', 'error');
      });
    });
  }
  </script>
</body>
</html>
